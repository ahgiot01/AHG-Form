<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AHG - Patient Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f2;--s1:#fff;--s2:#f0ece6;--s3:#e8e2da;
  --bd:#ddd7cf;--bd2:#c8c0b4;
  --tx:#2c2820;--tm:#7a7268;--td:#b0a898;
  --ac:#5c7a5c;--ac2:rgba(92,122,92,.12);
  --hi:#d4531a;--lo:#3a6ea8;--ok:#5c7a5c;
  --r:10px;--r2:7px;
  --fn:"Sarabun",sans-serif;--mo:"IBM Plex Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;}
.tb{background:var(--s1);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:100;}
.tb img{height:32px;width:auto;}
.tb-t{font-size:13px;font-weight:600;color:var(--tm);flex:1;}
.tb-cfg{background:none;border:none;color:var(--td);font:12px var(--fn);cursor:pointer;text-decoration:underline;}
.sb{padding:12px 14px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;gap:8px;}
.sb input{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:9px 12px;font:14px var(--fn);color:var(--tx);outline:none;}
.sb input:focus{border-color:var(--ac);}
.sb input::placeholder{color:var(--td);}
.sb button{padding:9px 18px;background:var(--tx);color:var(--bg);border:none;border-radius:var(--r2);font:600 13px var(--fn);cursor:pointer;}
.sb button:disabled{opacity:.5;}
.rp-tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);}
.rp-tabs button{flex:1;padding:10px 0;border:none;background:transparent;font:600 13px var(--fn);color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;}
.rp-tabs button.afo{color:var(--ac);border-color:var(--ac);}
.rp-tabs button.abr{color:#8b6f4e;border-color:#8b6f4e;}
.wrap{max-width:780px;margin:0 auto;padding:14px 12px 60px;}
.msg{text-align:center;padding:48px 16px;color:var(--td);}
.msg .ic{font-size:40px;margin-bottom:10px;}
.msg h2{font-size:15px;font-weight:600;color:var(--tm);margin-bottom:6px;}
.spin{display:inline-block;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.pane{display:none;}
.pane.on{display:block;}
.ptc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.ptc-ico{font-size:30px;}
.ptc-name{font-size:16px;font-weight:700;}
.ptc-meta{font-size:11px;color:var(--tm);margin-top:2px;}
.ptc-cn{font-family:var(--mo);font-size:10px;color:var(--td);background:var(--s2);padding:2px 6px;border-radius:4px;}
.vbar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.vbtn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s1);font:600 11px var(--mo);color:var(--tm);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.vbtn.on{background:var(--tx);border-color:var(--tx);color:var(--bg);}
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.sec-h{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.sec-ic{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--ac2);color:var(--ac);}
.sec-t{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tm);}
.sec-b{padding:10px 13px;}
.tr{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.tr:last-child{border-bottom:none;}
.sub{font-size:10px;color:var(--td);}
.tr-norm{font-size:10px;color:var(--td);text-align:right;}
.tr-v{font-family:var(--mo);font-weight:600;text-align:right;min-width:55px;}
.tr-v.nil{color:var(--td);font-weight:400;}
.cq-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.cq-c{background:var(--s2);border-radius:var(--r2);padding:10px 12px;}
.cq-l{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--td);margin-bottom:4px;}
.cq-v{font:700 22px var(--mo);}
.cq-v .u{font-size:11px;font-weight:400;color:var(--tm);}
.mr{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.mr:last-child{border-bottom:none;}
.mr-s{font-family:var(--mo);font-weight:600;text-align:right;}
.mr-m{font-size:10px;color:var(--td);}
.vt{width:100%;border-collapse:collapse;font-size:12px;}
.vt th{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--td);text-align:center;padding:4px 6px;background:var(--s2);}
.vt td{padding:6px 8px;text-align:center;font-family:var(--mo);border-top:1px solid var(--bd);}
.vl{text-align:left !important;font-family:var(--fn) !important;color:var(--tm);font-size:11px;font-weight:600;}
.ct{width:100%;border-collapse:collapse;font-size:12px;}
.ct th{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--td);text-align:center;padding:5px 6px;background:var(--s2);border:1px solid var(--bd);}
.ct td{padding:5px 7px;border:1px solid var(--bd);text-align:center;font-family:var(--mo);}
.nc{text-align:left !important;font-family:var(--fn) !important;color:var(--tm);font-size:11px;}
.du{color:var(--hi);font-size:10px;}
.dd{color:var(--lo);font-size:10px;}
.de{color:var(--td);font-size:10px;}
.fast-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(175,159,140,.12);border:1px solid rgba(175,159,140,.3);border-radius:var(--r2);padding:10px 14px;font-size:13px;font-weight:600;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:var(--bg);border-radius:var(--r);padding:9px 16px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:92vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#c0392b;}
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.mov.open{opacity:1;pointer-events:all;}
.mbox{background:var(--s1);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 28px;width:100%;}
.mbox h3{font-size:15px;margin-bottom:4px;}
.mbox p{color:var(--tm);font-size:12px;margin-bottom:12px;}
.mfi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:9px 11px;font:14px var(--fn);color:var(--tx);outline:none;margin-top:4px;margin-bottom:10px;display:block;}
.mfi:focus{border-color:var(--ac);}
.ma{display:flex;gap:8px;margin-top:12px;}
.bms{flex:1;padding:10px;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);font:600 13px var(--fn);cursor:pointer;}
.bmp{flex:1;padding:10px;border-radius:var(--r2);border:none;background:var(--tx);color:var(--bg);font:700 13px var(--fn);cursor:pointer;}
</style>
</head>

// Lookup function
function getNorm(key, age, gender) {
  var a = parseFloat(age) || 0;
  var isMale = (gender === 'ชาย');

  // Try age-specific table first
  var entry = NR_AGE[key];
  if (entry) {
    for (var i = 0; i < entry.ranges.length; i++) {
      var r = entry.ranges[i];
      var minA = r[0], maxA = r[1];
      if (minA === -1 || (a >= minA && a <= maxA)) {
        return isMale ? r[2] : r[3];
      }
    }
    return entry.def;
  }

  // Static table fallback
  var s = NR_STATIC[key];
  return s ? s.def : '-';
}

// Combined label lookup
function getLabel(key) {
  var e = NR_AGE[key] || NR_STATIC[key];
  return e ? e.l : key;
}
function getUnit(key) {
  var e = NR_AGE[key] || NR_STATIC[key];
  return e ? e.u : '';
}

// ── show/hide areas ──
function showArea(name) {
  var areas = ['empty','loading','nf','result'];
  areas.forEach(function(a) {
    byId('area-'+a).style.display = (a === name) ? '' : 'none';
  });
}

// ── search ──
function doSearch() {
  var cn = byId('inp-cn').value.trim();
  if (!cn) { showToast('กรุณากรอก CN','err'); return; }
  var cfg = getCfg();
  if (!cfg.url) { showToast('กรุณาตั้งค่า Script URL','err'); openCfg(); return; }

  showArea('loading');
  byId('btn-srch').disabled = true;

  var url = cfg.url;
  // Use XMLHttpRequest to avoid any async/await issues
  var xhr1 = new XMLHttpRequest();
  xhr1.open('GET', url + '?action=lookup&cn=' + encodeURIComponent(cn));
  xhr1.onload = function() {
    var d1;
    try { d1 = JSON.parse(xhr1.responseText); } catch(e) { showToast('ข้อมูลผิดพลาด','err'); showArea('empty'); byId('btn-srch').disabled=false; return; }
    if (d1.status !== 'found') {
      showArea('nf');
      byId('nf-msg').textContent = 'ไม่พบ CN: ' + cn + ' ใน PatientMaster';
      byId('btn-srch').disabled = false;
      return;
    }
    ST.patient = d1;

    // Fetch FO rows
    var xhr2 = new XMLHttpRequest();
    xhr2.open('GET', url + '?action=getAllRows&cn=' + encodeURIComponent(cn) + '&sheet=Data2');
    xhr2.onload = function() {
      var d2; try { d2 = JSON.parse(xhr2.responseText); } catch(e) { d2 = {rows:[]}; }
      ST.fo = (d2.rows || []).sort(function(a,b){ return a.date > b.date ? 1 : -1; });
      ST.foIdx = Math.max(0, ST.fo.length - 1);

      // Fetch Brain rows
      var xhr3 = new XMLHttpRequest();
      xhr3.open('GET', url + '?action=getAllRows&cn=' + encodeURIComponent(cn) + '&sheet=Data');
      xhr3.onload = function() {
        var d3; try { d3 = JSON.parse(xhr3.responseText); } catch(e) { d3 = {rows:[]}; }
        ST.br = (d3.rows || []).sort(function(a,b){ return a.date > b.date ? 1 : -1; });
        ST.brIdx = Math.max(0, ST.br.length - 1);

        byId('btn-srch').disabled = false;
        renderAll();
        showArea('result');
        activateTab('fo');
      };
      xhr3.onerror = function() { showToast('เชื่อมต่อไม่ได้','err'); showArea('empty'); byId('btn-srch').disabled=false; };
      xhr3.send();
    };
    xhr2.onerror = function() { showToast('เชื่อมต่อไม่ได้','err'); showArea('empty'); byId('btn-srch').disabled=false; };
    xhr2.send();
  };
  xhr1.onerror = function() { showToast('เชื่อมต่อไม่ได้','err'); showArea('empty'); byId('btn-srch').disabled=false; };
  xhr1.send();
}

// ── tabs ──
function activateTab(t) {
  ST.activeTab = t;
  byId('pane-fo').className = (t==='fo') ? 'pane on' : 'pane';
  byId('pane-br').className = (t==='br') ? 'pane on' : 'pane';
  byId('tb-fo').className   = (t==='fo') ? 'afo' : '';
  byId('tb-br').className   = (t==='br') ? 'abr' : '';
  if (t==='fo') renderFO(); else renderBR();
}

  renderPtCard('fo'); renderPtCard('br');

}

// ── patient card ──

  var p = ST.patient;

  var ico = p.gender==='หญิง' ? '&#128105;' : (p.gender==='ชาย' ? '&#128104;' : '&#128100;');
  byId(t+'-ptc').innerHTML =
    '<div class="ptc"><div class="ptc-ico">'+ico+'</div>'+
    '<div style="flex:1"><div class="ptc-name">'+htmlEsc(p.name||'-')+'</div>'+
    '<div class="ptc-meta">'+(p.age ? 'อายุ '+p.age+' ปี &nbsp; ' : '')+htmlEsc(p.gender||'')+
    ' &nbsp;<span class="ptc-cn">CN: '+htmlEsc(p.cn)+'</span></div></div>'+
    '<div style="font-family:var(--mo);font-size:11px;color:var(--td)">'+visits.length+' ครั้ง</div></div>';
}

// ── visit buttons ──
function renderVBar(t) {
  var visits = (t==='fo') ? ST.fo : ST.br;
  var idx    = (t==='fo') ? ST.foIdx : ST.brIdx;
  var h = '';
  visits.forEach(function(v, i) {
    var d = (v.date||'').substring(0,10);
    h += '<button class="vbtn'+(i===idx?' on':'')
      +'" data-tab="'+t+'" data-idx="'+i+'">ครั้ง '+(v.visit||i+1)
      +'<br><span style="font-size:9px;font-weight:400">'+d+'</span></button>';
  });
  if (visits.length > 1) {
    h += '<button class="vbtn'+(idx===-1?' on':'')+'" data-tab="'+t+'" data-idx="-1">&#128202; เปรียบเทียบ</button>';
  }
  byId(t+'-vbar').innerHTML = h;
}

       + '<div class="sec-b" style="font-size:13px;line-height:1.7;color:var(--tm)">'+htmlEsc(row.fo_note)+'</div></div>';

   ['+3min','fo_bp_post3','fo_hr_post3','fo_spo2_post3']].forEach(function(r) {

function renderFOCmp() {
  var keys = ['fo_2mwt','fo_grip_r','fo_grip_l','fo_tug','fo_10m','fo_bal_feet','fo_30sts','fo_waist','fo_hip'];
  var h = '<div class="sec"><div class="sec-h"><div class="sec-ic">&#128202;</div><div class="sec-t">เปรียบเทียบทุกครั้ง</div></div>'
        + '<div class="sec-b" style="overflow-x:auto"><table class="ct"><thead><tr><th class="nc">Test</th>';
  ST.fo.forEach(function(v,i) { h += '<th>ครั้ง'+(v.visit||i+1)+'<br><span style="font-size:9px;font-weight:400">'+(v.date||'').substring(0,10)+'</span></th>'; });
  h += '</tr></thead><tbody>';
  keys.forEach(function(k) {
    var lbl = getLabel(k); if (!lbl) return;
    var vals = ST.fo.map(function(v) { return toNum(v[k]); });
    h += '<tr><td class="nc">'+htmlEsc(lbl)+'</td>';
    vals.forEach(function(val, i) {
      var dlt = '';
      if (i > 0 && val !== null && vals[i-1] !== null) {
        var d = val - vals[i-1];
        dlt = d > 0 ? '<span class="du"> +'+Math.abs(d).toFixed(1)+'</span>' : d < 0 ? '<span class="dd"> -'+Math.abs(d).toFixed(1)+'</span>' : '<span class="de"> =</span>';
      }
      h += '<td>'+(val!==null?val:'-')+dlt+'</td>';
    });
    h += '</tr>';
  });
  return h + '</tbody></table></div></div>';
}

  if (!row) { el.innerHTML = ''; return; }
  var h = '<div style="font-size:11px;color:var(--td);font-family:var(--mo);margin-bottom:10px">'
        + 'วันที่ '+(row.date||'-').substring(0,10)+'  ·  ครั้งที่ '+(row.visit||'-')+'</div>';

  // CQ
  var cqo = toNum(row.br_cq_overall);
  var cqTxt = cqo===null?'':cqo<25?'Low':cqo<75?'Average':'Above Average';
  var cqClr = cqo===null?'var(--td)':cqo<25?'var(--hi)':cqo<75?'#8a7a00':'var(--ok)';
  h += '<div class="sec"><div class="sec-h"><div class="sec-ic">&#129504;</div><div class="sec-t">CQ Score</div></div><div class="sec-b">'
     + '<div class="cq-g">';
  [['Executive Function','br_cq_exf'],['Memory','br_cq_mem'],['Processing Speed','br_cq_ps']].forEach(function(p) {
    var v = toNum(row[p[1]]);
    h += '<div class="cq-c"><div class="cq-l">'+p[0]+'</div><div class="cq-v">'+(v!==null?v:'-')+'<span class="u">%</span></div></div>';
  });
  h += '<div class="cq-c" style="background:rgba(92,122,92,.08)"><div class="cq-l">CQ Overall</div>'
     + '<div class="cq-v" style="color:'+cqClr+'">'+(cqo!==null?cqo:'-')+'<span class="u">%</span></div>'
     + '<div style="font-size:11px;color:'+cqClr+'">'+cqTxt+'</div></div>'
     + '</div></div></div>';

  // TAQ
  var taq = toNum(row.br_taq);
  var taqTxt = taq===null?'':taq<=3?'Normal':taq<=12?'MCI':'Dementia';
  var taqClr = taq===null?'var(--td)':taq<=3?'var(--ok)':taq<=12?'#8a7a00':'var(--hi)';
  h += '<div class="sec"><div class="sec-h"><div class="sec-ic">&#9889;</div><div class="sec-t">TAQ Score</div></div><div class="sec-b">'
     + '<div style="display:flex;align-items:center;gap:14px">'
     + '<div style="font:700 34px var(--mo);color:'+taqClr+'">'+(taq!==null?taq:'-')+'</div>'
     + '<div><div style="font-size:14px;font-weight:700;color:'+taqClr+'">'+taqTxt+'</div>'
     + '<div style="font-size:11px;color:var(--td);margin-top:2px">Normal &lt;=3 · MCI 4-12 · Dementia &gt;12</div></div></div>'
     + '</div></div>';

  // MoCA
  var mo = toNum(row.br_moca_overall);
  var moTxt = mo===null?'':mo>=26?'Normal':mo>=19?'MCI':'Dementia';
  var moClr = mo===null?'var(--td)':mo>=26?'var(--ok)':mo>=19?'#8a7a00':'var(--hi)';
  h += '<div class="sec"><div class="sec-h"><div class="sec-ic">&#128203;</div><div class="sec-t">MoCA Score</div></div><div class="sec-b">';
  [['Visuospatial/Executive','br_moca_vis','5'],['Naming','br_moca_nam','3'],
   ['Attention','br_moca_att','6'],['Language','br_moca_lang','3'],
   ['Abstraction','br_moca_abs','2'],['Delayed Recall','br_moca_del','5'],
   ['Orientation','br_moca_ori','6']].forEach(function(m) {
    var v = toNum(row[m[1]]);
    h += '<div class="mr"><div>'+m[0]+'</div><div class="mr-m">/'+m[2]+'</div><div class="mr-s">'+(v!==null?v:'-')+'</div></div>';
  });
  h += '<div style="display:flex;align-items:center;gap:10px;margin-top:10px">'
     + '<span style="font-size:11px;color:var(--td)">Total</span>'
     + '<span style="font:700 26px var(--mo);color:'+moClr+'">'+(mo!==null?mo:'-')+'</span>'
     + '<span style="font-size:12px;color:var(--td)">/30</span>'
     + '<span style="font-size:13px;font-weight:700;color:'+moClr+'">'+moTxt+'</span></div>'
     + '</div></div>';

  // FAST
  if (row.br_fast && row.br_fast.trim()) {
    h += '<div class="sec"><div class="sec-h"><div class="sec-ic">&#128202;</div><div class="sec-t">FAST Stage</div></div>'
       + '<div class="sec-b"><div class="fast-chip">'+htmlEsc(row.br_fast)+'</div></div></div>';
  }

  // Summary
  if (row.br_summary || row.br_suggestion) {
    h += '<div class="sec"><div class="sec-h"><div class="sec-ic">&#128221;</div><div class="sec-t">Summary / Suggestion</div></div><div class="sec-b">';
    if (row.br_summary) h += '<div style="font-size:13px;font-weight:600;margin-bottom:6px">'+htmlEsc(row.br_summary)+'</div>';
    if (row.br_suggestion) h += '<div style="font-size:12px;color:var(--tm);line-height:1.7">'+htmlEsc(row.br_suggestion)+'</div>';
    h += '</div></div>';
  }
  el.innerHTML = h;
}

function renderBRCmp() {
  var h = '<div class="sec"><div class="sec-h"><div class="sec-ic">&#128202;</div><div class="sec-t">เปรียบเทียบทุกครั้ง</div></div>'
        + '<div class="sec-b" style="overflow-x:auto"><table class="ct"><thead><tr><th class="nc">Test</th>';
  ST.br.forEach(function(v,i) { h += '<th>ครั้ง'+(v.visit||i+1)+'<br><span style="font-size:9px;font-weight:400">'+(v.date||'').substring(0,10)+'</span></th>'; });
  h += '</tr></thead><tbody>';
  [['CQ Executive','br_cq_exf'],['CQ Memory','br_cq_mem'],['CQ Processing','br_cq_ps'],
   ['CQ Overall','br_cq_overall'],['TAQ','br_taq'],['MoCA Total','br_moca_overall']].forEach(function(p) {
    var vals = ST.br.map(function(v) { return toNum(v[p[1]]); });
    h += '<tr><td class="nc">'+p[0]+'</td>';
    vals.forEach(function(val, i) {
      var dlt = '';
      if (i > 0 && val !== null && vals[i-1] !== null) {
        var d = val - vals[i-1];
        dlt = d>0 ? '<span class="du"> +'+Math.abs(d).toFixed(1)+'</span>' : d<0 ? '<span class="dd"> -'+Math.abs(d).toFixed(1)+'</span>' : '<span class="de"> =</span>';
      }
      h += '<td>'+(val!==null?val:'-')+dlt+'</td>';
    });
    h += '</tr>';
  });
  return h + '</tbody></table></div></div>';
}

// ── config ──
function openCfg() { byId('cfg-url').value = getCfg().url||''; byId('rpt-modal').classList.add('open'); }
function closeCfg() { byId('rpt-modal').classList.remove('open'); }

// ── toast ──
function showToast(msg, type) {
  var t = byId('rpt-toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='err'?'err':'') + ' show';
  clearTimeout(t._tid);
  t._tid = setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// ── event listeners (no inline onclick) ──
document.addEventListener('DOMContentLoaded', function() {
  // search
  byId('btn-srch').addEventListener('click', doSearch);
  byId('inp-cn').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
  // tabs
  byId('tb-fo').addEventListener('click', function() { activateTab('fo'); });
  byId('tb-br').addEventListener('click', function() { activateTab('br'); });
  // visit buttons (delegated)
  byId('fo-vbar').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-idx]'); if (!btn) return;
    ST.foIdx = parseInt(btn.dataset.idx); renderVBar('fo'); renderFO();
  });
  byId('br-vbar').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-idx]'); if (!btn) return;
    ST.brIdx = parseInt(btn.dataset.idx); renderVBar('br'); renderBR();
  });
  // config
  byId('btn-cfg').addEventListener('click', openCfg);
  byId('btn-cfg-cancel').addEventListener('click', closeCfg);
  byId('btn-cfg-save').addEventListener('click', function() {
    localStorage.setItem('ahg_rpt', JSON.stringify({url: byId('cfg-url').value.trim()}));
    closeCfg(); showToast('บันทึกแล้ว');
  });
  byId('rpt-modal').addEventListener('click', function(e) { if (e.target===this) closeCfg(); });
  // auto open config
  if (!getCfg().url) setTimeout(openCfg, 600);
});

})(); // end IIFE
</script>
</body>
</html>
