<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AHG Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f5f2;--s1:#fff;--s2:#f0ece6;--s3:#e8e2da;--bd:#ddd7cf;--tx:#2c2820;--tm:#7a7268;--td:#b0a898;--ac:#5c7a5c;--hi:#d4531a;--lo:#3a6ea8;--fn:"Sarabun",sans-serif;--mo:"IBM Plex Mono",monospace;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;}
.tb{background:var(--s1);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.tb img{height:32px;width:auto;}.tb-t{flex:1;font-size:13px;font-weight:600;color:var(--tm);}
.btn-cfg{background:none;border:none;color:var(--td);font:12px var(--fn);cursor:pointer;text-decoration:underline;}
.sb{padding:10px 14px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;gap:8px;}
.sb input{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:6px;padding:8px 11px;font:14px var(--fn);color:var(--tx);outline:none;}
.sb input:focus{border-color:var(--ac);}.sb input::placeholder{color:var(--td);}
.sb button{padding:8px 18px;background:var(--tx);color:var(--bg);border:none;border-radius:6px;font:600 13px var(--fn);cursor:pointer;}
.sb button:disabled{opacity:.5;}
.rp-tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);}
.rp-tabs button{flex:1;padding:10px 0;border:none;background:transparent;font:600 13px var(--fn);color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.rp-tabs button.afo{color:#2c6e2c;border-color:#2c6e2c;}
.rp-tabs button.abr{color:#6b3fa0;border-color:#6b3fa0;}
.wrap{max-width:980px;margin:0 auto;padding:14px 12px 60px;}.pane{display:none;}.pane.on{display:block;}
.msg{text-align:center;padding:48px 16px;color:var(--td);}
.msg .ic{font-size:38px;margin-bottom:10px;}.msg h2{font-size:15px;font-weight:600;color:var(--tm);margin-bottom:5px;}
.spin{display:inline-block;animation:sp .7s linear infinite;}@keyframes sp{to{transform:rotate(360deg)}}
.vbar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.vbtn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s1);font:600 11px var(--mo);color:var(--tm);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.vbtn.on{background:var(--tx);border-color:var(--tx);color:var(--bg);}
/* FO table */
.btn-print{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--tx);color:var(--bg);border:none;border-radius:6px;font:600 12px var(--fn);cursor:pointer;margin-bottom:14px;}
.rpt{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:18px;font-size:11px;}
.rpt-hd{display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--tx);padding-bottom:10px;margin-bottom:12px;}
.rpt-title{font-size:17px;font-weight:700;letter-spacing:.07em;}.rpt-sub{font-size:10px;color:var(--tm);margin-top:2px;}
.rpt-meta{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--bd);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.rpt-mh{background:var(--tx);color:var(--bg);padding:4px 7px;font-weight:700;text-align:center;font-size:10px;letter-spacing:.04em;}
.rpt-mv{padding:4px 7px;text-align:center;font-family:var(--mo);font-size:11px;border-top:1px solid var(--bd);}
.rpt-tbl{width:100%;border-collapse:collapse;}.rpt-tbl th,.rpt-tbl td{border:1px solid var(--bd);padding:4px 6px;vertical-align:middle;}
.sh td{background:var(--tx);color:var(--bg);font-weight:700;font-size:11px;letter-spacing:.05em;padding:5px 8px;}
.bh td{background:var(--s2);color:var(--tm);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:4px 8px;}
.ch th{background:var(--s2);font-weight:700;text-align:center;font-size:10px;}
.tn{padding-left:10px;font-size:11px;}.tu{font-size:9px;color:var(--td);display:block;}
.tv{text-align:center;font-family:var(--mo);font-size:11px;}.tv.nil{color:var(--td);}
.tnm{text-align:center;font-size:10px;color:var(--tm);background:#fafaf8;}
.vt{width:100%;border-collapse:collapse;font-size:10px;}
.vt th{background:var(--s2);padding:3px 5px;border:1px solid var(--bd);text-align:center;font-weight:700;font-size:9px;}
.vt td{border:1px solid var(--bd);padding:3px 5px;text-align:center;font-family:var(--mo);}
.vl{text-align:left!important;font-family:var(--fn)!important;font-weight:600;color:var(--tm);}
/* Brain / Cognitive Report */
.cog-rpt{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:20px;font-size:12px;}
.cog-title{text-align:center;color:#2d5a27;font-size:22px;font-weight:700;letter-spacing:.06em;margin-bottom:2px;}
.cog-sub{text-align:center;color:#2d5a27;font-size:13px;margin-bottom:16px;}
.cog-pt{margin-bottom:16px;}.cog-pt-title{font-size:13px;font-weight:700;margin-bottom:6px;}
.cog-pt-grid{display:grid;grid-template-columns:60px 1fr 60px 1fr;gap:4px 8px;font-size:12px;}
.cog-lbl{color:var(--tm);font-weight:600;}.cog-val{border-bottom:1px dotted var(--bd);padding-bottom:1px;font-family:var(--mo);}
.cog-sec{margin-bottom:14px;border:1px solid #b8d4b0;border-radius:6px;overflow:hidden;}
.cog-sec-h{background:#e8f2e4;display:flex;align-items:center;gap:10px;padding:8px 12px;}
.cog-num{background:#2d5a27;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.cog-sec-t{font-size:14px;font-weight:700;color:#2d5a27;}.cog-sec-b{padding:12px;}
.cq-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.cq-tbl th{background:#c8e0c0;padding:5px 8px;text-align:left;font-weight:700;border:1px solid #b8d4b0;}
.cq-tbl td{padding:5px 8px;border:1px solid #d4e8ce;}.cq-overall td{font-weight:700;background:#e8f2e4;}
.ref-box{background:#fff8e8;border:1px solid #e8d8a0;border-radius:4px;padding:8px 9px;font-size:11px;display:flex;flex-direction:column;justify-content:center;}
.ref-title{display:flex;align-items:center;gap:4px;font-weight:700;margin-bottom:6px;color:#2d5a27;font-size:11px;white-space:nowrap;}
.ref-row{display:flex;justify-content:space-between;gap:6px;padding:2px 0;font-size:10.5px;}.ref-row span:first-child{color:var(--tm);}
.score-box{border:1px solid var(--bd);border-radius:6px;padding:10px;text-align:center;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.score-lbl{font-size:11px;color:var(--tm);margin-bottom:4px;font-weight:600;}
.score-val{font:700 30px var(--mo);line-height:1;}
.score-interp{font-size:12px;font-weight:700;margin-top:4px;}
.chart-box{border:1px solid var(--bd);border-radius:6px;background:#fafafa;padding:6px;display:flex;flex-direction:column;}
.chart-box-title{font-size:11px;font-weight:700;color:#2d5a27;margin-bottom:2px;padding:0 2px;}
/* Modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.mov.open{opacity:1;pointer-events:all;}
.mbox{background:var(--s1);border-radius:10px 10px 0 0;padding:20px 16px 28px;width:100%;}
.mbox h3{font-size:15px;margin-bottom:4px;}.mbox p{color:var(--tm);font-size:12px;margin-bottom:12px;}
.mfi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:6px;padding:9px 11px;font:14px var(--fn);color:var(--tx);outline:none;margin:4px 0 10px;display:block;}
.mfi:focus{border-color:var(--ac);}.ma{display:flex;gap:8px;margin-top:12px;}
.bms{flex:1;padding:10px;border-radius:6px;border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);font:600 13px var(--fn);cursor:pointer;}
.bmp{flex:1;padding:10px;border-radius:6px;border:none;background:var(--tx);color:var(--bg);font:700 13px var(--fn);cursor:pointer;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:var(--bg);border-radius:8px;padding:9px 16px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:92vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}.toast.err{background:#c0392b;}
@media print{
  .tb,.sb,.rp-tabs,.btn-print,.mov,.toast,.vbar{display:none!important;}
  body{background:#fff;font-size:9px;}
  .wrap{padding:0;max-width:100%;}
  .rpt,.cog-rpt{border:none;border-radius:0;padding:6px;}
  @page{size:A4 portrait;margin:8mm;}

  /* FO - compact */
  .rpt-hd{padding-bottom:5px;margin-bottom:6px;}
  .rpt-hd img{height:32px;}
  .rpt-title{font-size:13px;}
  .rpt-sub{font-size:8px;}
  .rpt-meta{margin-bottom:6px;}
  .rpt-mh{font-size:8px;padding:2px 4px;}
  .rpt-mv{font-size:9px;padding:2px 4px;}
  .rpt-tbl th,.rpt-tbl td{padding:2px 4px;font-size:8px;}
  .sh td{padding:3px 6px;font-size:9px;}
  .bh td{padding:2px 6px;font-size:8px;}
  .tn{font-size:8px;padding-left:6px;}
  .tu{font-size:7px;}
  .tv{font-size:8px;}
  .tnm{font-size:8px;}
  .vt th,.vt td{font-size:8px;padding:2px 4px;}

  /* Brain - compact */
  .cog-title{font-size:15px;margin-bottom:1px;}
  .cog-sub{font-size:9px;margin-bottom:8px;}
  .cog-pt{margin-bottom:8px;}
  .cog-pt-title{font-size:10px;margin-bottom:3px;}
  .cog-pt-grid{font-size:9px;gap:2px 6px;}
  .cog-sec{margin-bottom:8px;}
  .cog-sec-h{padding:4px 8px;}
  .cog-num{width:16px;height:16px;font-size:8px;}
  .cog-sec-t{font-size:11px;}
  .cog-sec-b{padding:6px 8px;}
  .cq-tbl th,.cq-tbl td{font-size:8px;padding:3px 5px;}
  .ref-box{padding:5px 7px;}
  .ref-title{font-size:9px;margin-bottom:3px;}
  .ref-row{font-size:8px;padding:1px 0;}
  .cog-sec-b svg{max-width:140px!important;}
}
</style>
</head>

  fo_sls_r:{l:'- Single leg stance ขวา',u:'sec.',n:'-'},fo_sls_close_l:{l:'- SLS (close-eyes) ซ้าย',u:'sec.',n:'-'},

function norm(k,age,gender){var a=parseFloat(age)||0,m=(gender==='ชาย');var e=NR_AGE[k];if(e){for(var i=0;i<e.r.length;i++){var r=e.r[i];if(r[0]===-1||(a>=r[0]&&a<=r[1]))return m?r[2]:r[3];}return'-';}var s=NR_S[k];return s?s.n:'-';}

function doSearch(){
  var cn=byId('inp-cn').value.trim();
  if(!cn){showToast('กรุณากรอก CN','err');return;}
  var cfg=getCfg();if(!cfg.url){showToast('กรุณาตั้งค่า Script URL','err');openCfg();return;}
  showArea('loading');byId('btn-srch').disabled=true;
  var url=cfg.url;
  var x1=new XMLHttpRequest();x1.open('GET',url+'?action=lookup&cn='+encodeURIComponent(cn));
  x1.onload=function(){
    var d1;try{d1=JSON.parse(x1.responseText);}catch(e){showToast('ข้อมูลผิดพลาด','err');showArea('empty');byId('btn-srch').disabled=false;return;}
    if(d1.status!=='found'){showArea('nf');byId('nf-msg').textContent='ไม่พบ CN: '+cn;byId('btn-srch').disabled=false;return;}
    ST.patient=d1;
    var x2=new XMLHttpRequest();x2.open('GET',url+'?action=getAllRows&cn='+encodeURIComponent(cn)+'&sheet=Data2');
    x2.onload=function(){
      var d2;try{d2=JSON.parse(x2.responseText);}catch(e){d2={rows:[]};}
      ST.fo=(d2.rows||[]).sort(function(a,b){return a.date>b.date?1:-1;}).slice(-4);
      var x3=new XMLHttpRequest();x3.open('GET',url+'?action=getAllRows&cn='+encodeURIComponent(cn)+'&sheet=Data');
      x3.onload=function(){
        var d3;try{d3=JSON.parse(x3.responseText);}catch(e){d3={rows:[]};}
        ST.br=(d3.rows||[]).sort(function(a,b){return a.date>b.date?1:-1;});
        ST.brIdx=Math.max(0,ST.br.length-1);
        byId('btn-srch').disabled=false;
        renderFO();renderBrVbar();renderBR();
        showArea('result');activateTab(ST.tab);
      };
      x3.onerror=function(){showToast('เชื่อมต่อไม่ได้','err');showArea('empty');byId('btn-srch').disabled=false;};
      x3.send();
    };
    x2.onerror=function(){showToast('เชื่อมต่อไม่ได้','err');showArea('empty');byId('btn-srch').disabled=false;};
    x2.send();
  };
  x1.onerror=function(){showToast('เชื่อมต่อไม่ได้','err');showArea('empty');byId('btn-srch').disabled=false;};
  x1.send();
}
function activateTab(t){
  ST.tab=t;
  byId('pane-fo').className=(t==='fo')?'pane on wrap':'pane wrap';
  byId('pane-br').className=(t==='br')?'pane on wrap':'pane wrap';
  byId('tb-fo').className=(t==='fo')?'afo':'';
  byId('tb-br').className=(t==='br')?'abr':'';
}

    blocks.forEach(function(bl){
      if(bl.s)h+='<tr class="bh"><td colspan="7">'+esc(bl.s)+'</td></tr>';
      bl.rows.forEach(function(k){
        var lb=lbl(k);if(!lb)return;var u=unt(k),nr=norm(k,age,gender);

        h+='<td style="font-size:10px;color:var(--td);padding:3px 5px;">'+esc(u)+'</td>';
        for(var vi=0;vi<4;vi++){
          if(vi<nv){var v=vs[vi][k],has=(v!==''&&v!==null&&v!==undefined);h+='<td class="tv'+(has?'':' nil')+'">'+(has?esc(String(v)):'-')+'</td>';}
          else h+='<td class="tv nil">-</td>';
        }
        h+='<td class="tnm">'+esc(nr)+'</td></tr>';
      });
    });
  });
  h+='</tbody></table>';
  var hasV=vs.some(function(v){return v.fo_bp_pre||v.fo_hr_pre;});
  if(hasV){
    h+='<div style="border:1px solid var(--bd);border-radius:4px;overflow:hidden;margin-top:10px;">';
    h+='<div style="background:var(--tx);color:var(--bg);padding:5px 10px;font-size:11px;font-weight:700;letter-spacing:.05em">VITAL SIGNS</div>';
    h+='<table class="vt"><thead><tr><th class="vl"></th>';
    for(var vi=0;vi<4;vi++){if(vi<nv)h+='<th colspan="3">ครั้งที่ '+esc(String(vs[vi].visit||(vi+1)))+'</th>';else h+='<th colspan="3">-</th>';}
    h+='</tr><tr><th class="vl"></th>';for(var vi=0;vi<4;vi++)h+='<th>BP</th><th>HR</th><th>SpO2</th>';
    h+='</tr></thead><tbody>';
    [['ก่อน','fo_bp_pre','fo_hr_pre','fo_spo2_pre'],['หลัง','fo_bp_post','fo_hr_post','fo_spo2_post'],['+3min','fo_bp_post3','fo_hr_post3','fo_spo2_post3']].forEach(function(row){

      for(var vi=0;vi<4;vi++){if(vi<nv){h+='<td>'+fmt(vs[vi][row[1]])+'</td><td>'+fmt(vs[vi][row[2]])+'</td><td>'+fmt(vs[vi][row[3]])+'</td>';}else h+='<td>-</td><td>-</td><td>-</td>';}
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }

  if(notes.length)h+='<div style="margin-top:8px;font-size:11px;border-top:1px solid var(--bd);padding-top:6px;"><b>Note: </b>'+notes.map(esc).join(' | ')+'</div>';
  el.innerHTML=h;
}

  var vs=ST.br,idx=ST.brIdx,h='';
  vs.forEach(function(v,i){h+='<button class="vbtn'+(i===idx?' on':'')+'" data-i="'+i+'">ครั้ง '+(v.visit||(i+1))+'<br><span style="font-size:9px;font-weight:400">'+fmtD(v.date)+'</span></button>';});

  h+='</tbody></table>';
  h+='<div class="ref-box"><div class="ref-title">&#9654; Reference Range</div>';
  [['Very Low','&lt;2'],['Low','2-8'],['Low Average','9-24'],['Average','25-74'],['Above Average','&gt;74']].forEach(function(r){h+='<div class="ref-row"><span>'+r[0]+':</span><span>'+r[1]+'</span></div>';});

  h+='</div></div></div>';

  h+='</div></div></div>';
  var mo=toNum(row.br_moca_overall);var moT=mo===null?'-':mo>=26?'Normal':mo>=19?'MCI':'Dementia';var moC=mo===null?'var(--td)':mo>=26?'#2d5a27':mo>=19?'#8a7a00':'var(--hi)';
  var MF=[{l:'Visuospatial /\nExecutive',k:'br_moca_vis',m:5},{l:'Naming',k:'br_moca_nam',m:3},{l:'Attention',k:'br_moca_att',m:6},{l:'Language',k:'br_moca_lang',m:3},{l:'Abstraction',k:'br_moca_abs',m:2},{l:'Delayed\nRecall',k:'br_moca_del',m:5},{l:'Orientation',k:'br_moca_ori',m:6}];
  var MV=MF.map(function(f){return toNum(row[f.k]);});
  var cx=105,cy=105,R=55,n7=7,svg='';
  for(var ri=1;ri<=4;ri++){var rr=R*ri/4,pp='';for(var ii=0;ii<n7;ii++){var ang=(Math.PI*2/n7)*ii-Math.PI/2;pp+=(cx+rr*Math.cos(ang)).toFixed(1)+','+(cy+rr*Math.sin(ang)).toFixed(1)+' ';}svg+='<polygon points="'+pp.trim()+'" fill="none" stroke="#c8e0c0" stroke-width="'+(ri===4?1.2:.6)+'"/>';}
  for(var ii=0;ii<n7;ii++){var ang=(Math.PI*2/n7)*ii-Math.PI/2;svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+R*Math.cos(ang)).toFixed(1)+'" y2="'+(cy+R*Math.sin(ang)).toFixed(1)+'" stroke="#c8e0c0" stroke-width=".6"/>';}
  var dp='';for(var ii=0;ii<n7;ii++){var ang=(Math.PI*2/n7)*ii-Math.PI/2;var v=MV[ii],mx=MF[ii].m;var rt=(v!==null&&mx>0)?v/mx:0;dp+=(cx+R*rt*Math.cos(ang)).toFixed(1)+','+(cy+R*rt*Math.sin(ang)).toFixed(1)+' ';}
  svg+='<polygon points="'+dp.trim()+'" fill="rgba(45,90,39,.15)" stroke="#2d5a27" stroke-width="1.5"/>';
  for(var ii=0;ii<n7;ii++){var ang=(Math.PI*2/n7)*ii-Math.PI/2;var v=MV[ii],mx=MF[ii].m;var rt=(v!==null&&mx>0)?v/mx:0;svg+='<circle cx="'+(cx+R*rt*Math.cos(ang)).toFixed(1)+'" cy="'+(cy+R*rt*Math.sin(ang)).toFixed(1)+'" r="2.8" fill="#2d5a27"/>';}
  for(var ii=0;ii<n7;ii++){var ang=(Math.PI*2/n7)*ii-Math.PI/2;var lx=(cx+(R+38)*Math.cos(ang)).toFixed(1),ly=(cy+(R+38)*Math.sin(ang)).toFixed(1);var v=MV[ii],mx=MF[ii].m;var lb=(v!==null?v:'-')+'/'+mx+' '+MF[ii].l.replace('\n',' ');var anc=Math.cos(ang)>.15?'start':Math.cos(ang)<-.15?'end':'middle';svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="'+anc+'" font-size="7.5" font-family="Sarabun,sans-serif" fill="#555" dominant-baseline="middle">'+lb+'</text>';}
  h+='<div class="cog-sec"><div class="cog-sec-h"><div class="cog-num">3</div><div class="cog-sec-t">MoCA Score</div></div>';
  h+='<div class="cog-sec-b"><div style="display:grid;grid-template-columns:1fr 110px 155px;gap:10px;align-items:stretch;">';
  h+='<div style="display:flex;align-items:center;justify-content:center;"><svg viewBox="0 0 210 210" style="width:100%;max-width:260px;overflow:visible">'+svg+'</svg></div>';
  h+='<div class="score-box"><div class="score-lbl">Score</div>';
  h+='<div class="score-val" style="color:'+moC+'">'+(mo!==null?mo:'-')+'</div>';
  h+='<div class="score-interp" style="color:'+moC+'">'+moT+'</div></div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px;">';
  h+='<div class="ref-box"><div class="ref-title">&#9654; Reference Range</div>';
  [['Normal','28-30'],['MCI','19-27'],['Dementia','&lt;19']].forEach(function(r){h+='<div class="ref-row"><span>'+r[0]+':</span><span>'+r[1]+'</span></div>';});
  h+='</div>';
  if(ST.br.length>1){var moVals=ST.br.map(function(v){return toNum(v.br_moca_overall);});h+=chartBox('MoCA SCORE',trendChart(moVals,30,''));}
  h+='</div></div></div></div>';
  h+='<div class="cog-sec"><div class="cog-sec-h"><div class="cog-num">4</div><div class="cog-sec-t">Functional Assessment Scale (FAST)</div></div>';
  h+='<div class="cog-sec-b"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
  h+='<div style="border:1px solid var(--bd);border-radius:6px;padding:14px;text-align:center;font-size:13px;font-weight:600;background:var(--s2);">'+(row.br_fast?esc(row.br_fast):'—')+'</div>';
  h+='<div><div style="border:1px solid var(--bd);border-radius:6px;overflow:hidden;margin-bottom:8px;"><div style="background:#e8f2e4;padding:6px 10px;font-size:12px;font-weight:700;">Summary</div><div style="padding:8px 10px;font-size:12px;">'+(row.br_summary?esc(row.br_summary):'-')+'</div></div>';
  h+='<div style="border:1px solid var(--bd);border-radius:6px;overflow:hidden;"><div style="background:#e8f2e4;padding:6px 10px;font-size:12px;font-weight:700;">Suggestion</div><div style="padding:8px 10px;font-size:12px;">'+(row.br_suggestion?esc(row.br_suggestion):'-')+'</div></div></div>';
  h+='</div></div></div>';
  h+='</div>';
  el.innerHTML=h;
}

function chartBox(title, svgContent){
  return '<div class="chart-box"><div class="chart-box-title">'+title+'</div>'+svgContent+'</div>';
}


function trendChart(vals, maxY, label){
  if(!vals||vals.length<1) return '';
  var tw=95,th=48,tp=11,bp=label?9:2;
  var svg='<svg viewBox="0 0 '+(tw+tp*2)+' '+(th+tp+bp)+'" style="width:100%;max-width:155px;display:block;margin:0 auto;">';
  svg+='<line x1="'+tp+'" y1="2" x2="'+tp+'" y2="'+(2+th)+'" stroke="#ccc" stroke-width="1"/>';
  svg+='<line x1="'+tp+'" y1="'+(2+th)+'" x2="'+(tp+tw)+'" y2="'+(2+th)+'" stroke="#ccc" stroke-width="1"/>';
  var steps=maxY<=30?[10,20,30]:maxY<=12?[4,8,12]:[25,50,75,100];
  steps.forEach(function(v){
    var y=2+th-(v/maxY)*th;
    svg+='<line x1="'+(tp-2)+'" y1="'+y.toFixed(0)+'" x2="'+(tp+tw)+'" y2="'+y.toFixed(0)+'" stroke="#eee" stroke-width=".6"/>';
    svg+='<text x="'+(tp-3)+'" y="'+(y+2.5).toFixed(0)+'" text-anchor="end" font-size="6.5" fill="#aaa">'+v+'</text>';
  });
  var pts=vals.map(function(v,i){
    var x=tp+(i/Math.max(vals.length-1,1))*tw;
    var y=v!==null?(2+th-(v/maxY)*th):(2+th);
    return{x:x.toFixed(1),y:y.toFixed(1),v:v};
  });
  var pl=pts.filter(function(p){return p.v!==null;}).map(function(p){return p.x+','+p.y;}).join(' ');
  if(pl) svg+='<polyline points="'+pl+'" fill="none" stroke="#2d5a27" stroke-width="1.5"/>';
  pts.forEach(function(p){
    if(p.v!==null){
      svg+='<circle cx="'+p.x+'" cy="'+p.y+'" r="2.8" fill="#2d5a27"/>';
      svg+='<text x="'+p.x+'" y="'+(parseFloat(p.y)+9).toFixed(0)+'" text-anchor="middle" font-size="6.5" fill="#2d5a27">'+p.v+'</text>';
    }
  });
  svg+='</svg>';
  return svg;
}

function renderBRCmp(){
  var h='<div class="cog-sec"><div class="cog-sec-h"><div class="cog-num">&#128202;</div><div class="cog-sec-t">เปรียบเทียบทุกครั้ง</div></div><div class="cog-sec-b" style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>';
  h+='<th style="text-align:left;padding:5px 8px;background:#e8f2e4;border:1px solid #c8e0c0">Test</th>';
  ST.br.forEach(function(v,i){h+='<th style="text-align:center;padding:5px 6px;background:#e8f2e4;border:1px solid #c8e0c0">ครั้ง'+(v.visit||i+1)+'<br><span style="font-size:9px;font-weight:400">'+fmtD(v.date)+'</span></th>';});
  h+='</tr></thead><tbody>';
  [['CQ Executive','br_cq_exf'],['CQ Memory','br_cq_mem'],['CQ Processing','br_cq_ps'],['CQ Overall','br_cq_overall'],['TAQ','br_taq'],['MoCA Total','br_moca_overall']].forEach(function(p){
    var vals=ST.br.map(function(v){return toNum(v[p[1]]);});
    h+='<tr><td style="padding:4px 8px;border:1px solid #d4e8ce;color:var(--tm)">'+p[0]+'</td>';
    vals.forEach(function(val,i){var dlt='';if(i>0&&val!==null&&vals[i-1]!==null){var d=val-vals[i-1];dlt=d>0?' <span style="color:var(--hi);font-size:10px">+'+Math.abs(d).toFixed(1)+'</span>':d<0?' <span style="color:var(--lo);font-size:10px">-'+Math.abs(d).toFixed(1)+'</span>':'';}h+='<td style="text-align:center;padding:4px 6px;border:1px solid #d4e8ce;font-family:var(--mo)">'+(val!==null?val:'-')+dlt+'</td>';});
    h+='</tr>';
  });
  return h+'</tbody></table></div></div>';
}
function openCfg(){byId('cfg-url').value=getCfg().url||'';byId('rpt-modal').classList.add('open');}
function closeCfg(){byId('rpt-modal').classList.remove('open');}

  byId('tb-fo').addEventListener('click',function(){activateTab('fo');});

  byId('rpt-modal').addEventListener('click',function(e){if(e.target===this)closeCfg();});

  if(!getCfg().url)setTimeout(openCfg,600);
});
})();
