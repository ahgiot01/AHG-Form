<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHG · Patient Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f5f2; --s1:#ffffff; --s2:#f0ece6; --s3:#e8e2da;
  --bd:#ddd7cf; --bd2:#c8c0b4;
  --tx:#2c2820; --tm:#7a7268; --td:#b0a898;
  --ac:#5c7a5c; --ac2:rgba(92,122,92,.12);
  --sand:#af9f8c; --sand2:rgba(175,159,140,.12);
  --rose:#c4a89a; --rose2:rgba(196,168,154,.12);
  --hi:#d4531a; --lo:#3a6ea8; --no:#5c7a5c;
  --r:10px; --r2:7px;
  --fn:'Sarabun',sans-serif; --mo:'IBM Plex Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;}

/* ── TOPBAR ── */
.tb{background:var(--s1);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.tb img{height:34px;width:auto;}
.tb-title{font-size:13px;font-weight:600;color:var(--tm);flex:1;}
.tb-cfg{background:none;border:none;color:var(--tm);font:12px var(--fn);cursor:pointer;text-decoration:underline;}

/* ── SEARCH BAR ── */
.search-bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:14px 16px;display:flex;gap:10px;align-items:center;}
.search-bar input{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:9px 13px;font:14px var(--fn);color:var(--tx);outline:none;transition:border-color .15s;}
.search-bar input:focus{border-color:var(--ac);background:var(--s3);}
.search-bar input::placeholder{color:var(--td);}
.btn-search{padding:9px 20px;background:var(--tx);color:var(--bg);border:none;border-radius:var(--r2);font:600 13px var(--fn);cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-search:active{transform:scale(.97);}
.btn-search:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── TABS ── */
.report-tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);}
.rtab{flex:1;padding:10px 0;border:none;background:transparent;font:600 13px var(--fn);color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;}
.rtab.active-fo{color:var(--ac);border-color:var(--ac);}
.rtab.active-br{color:var(--sand);border-color:var(--sand);}

/* ── MAIN LAYOUT ── */
.layout{max-width:800px;margin:0 auto;padding:16px 12px 60px;}
.rtab-content{display:none;} .rtab-content.active{display:block;}

/* ── PATIENT CARD ── */
.pt-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:14px;}
.pt-ico{font-size:32px;}
.pt-info{flex:1;}
.pt-name{font-size:17px;font-weight:700;}
.pt-meta{font-size:12px;color:var(--tm);margin-top:2px;}
.pt-cn{font-family:var(--mo);font-size:11px;color:var(--td);background:var(--s2);padding:2px 7px;border-radius:4px;}

/* ── VISIT SELECTOR ── */
.visit-bar{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.visit-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s1);font:600 11px var(--mo);color:var(--tm);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;}
.visit-btn.active{background:var(--tx);border-color:var(--tx);color:var(--bg);}
.visit-btn:hover:not(.active){border-color:var(--ac);color:var(--ac);}

/* ── SECTION CARD ── */
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:12px;overflow:hidden;}
.sec-head{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:9px;}
.sec-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.ic-card{background:var(--ac2);color:var(--ac);}
.ic-sand{background:var(--sand2);color:#7a5a40;}
.ic-rose{background:var(--rose2);color:#8a4a3a;}
.ic-brain{background:rgba(120,80,200,.1);color:#7850c8;}
.sec-title{font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tm);}
.sec-body{padding:12px 14px;}

/* ── TEST ROW ── */
.test-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.test-row:last-child{border-bottom:none;}
.test-name{color:var(--tx);}
.test-name .sub{font-size:11px;color:var(--tm);}
.test-val{font-family:var(--mo);font-size:13px;font-weight:600;color:var(--tx);text-align:right;min-width:60px;}
.test-val.empty{color:var(--td);font-weight:400;}
.test-norm{font-size:10px;color:var(--td);text-align:right;}

/* ── LEVEL BADGE ── */
.lv{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;letter-spacing:.04em;font-family:var(--mo);}
.lv-H{background:rgba(212,83,26,.12);color:var(--hi);}
.lv-L{background:rgba(58,110,168,.12);color:var(--lo);}
.lv-N{background:rgba(92,122,92,.12);color:var(--no);}

/* ── VITAL TABLE ── */
.vital-table{width:100%;border-collapse:collapse;font-size:13px;}
.vital-table th{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--td);text-align:center;padding:4px 8px;background:var(--s2);}
.vital-table td{padding:7px 8px;text-align:center;font-family:var(--mo);font-size:13px;border-top:1px solid var(--bd);}
.vital-table .vt-label{text-align:left;font-family:var(--fn);color:var(--tm);font-size:12px;font-weight:600;}

/* ── BRAIN SCORE ── */
.cq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.cq-card{background:var(--s2);border-radius:var(--r2);padding:10px 12px;}
.cq-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--td);margin-bottom:4px;}
.cq-score{font:700 24px var(--mo);color:var(--tx);}
.cq-score .unit{font-size:12px;font-weight:400;color:var(--tm);}
.cq-interp{font-size:11px;margin-top:3px;}

/* ── MOCA GRID ── */
.moca-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.moca-row:last-child{border-bottom:none;}
.moca-score{font-family:var(--mo);font-weight:600;text-align:right;}
.moca-max{font-size:10px;color:var(--td);}

/* ── FAST ── */
.fast-chip{display:inline-flex;align-items:center;gap:8px;background:var(--sand2);border:1px solid rgba(175,159,140,.3);border-radius:var(--r2);padding:10px 14px;font-size:13px;font-weight:600;}

/* ── PROGRESS CHART ── */
.chart-wrap{position:relative;height:160px;margin:8px 0;}
.chart-svg{width:100%;height:100%;}

/* ── COMPARE TABLE (multi-visit) ── */
.cmp-table{width:100%;border-collapse:collapse;font-size:12px;}
.cmp-table th{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--td);text-align:center;padding:5px 6px;background:var(--s2);border:1px solid var(--bd);}
.cmp-table td{padding:6px 8px;border:1px solid var(--bd);text-align:center;font-family:var(--mo);}
.cmp-table td.name-col{text-align:left;font-family:var(--fn);color:var(--tm);font-size:11px;}
.cmp-table .delta-up{color:#d4531a;font-size:10px;}
.cmp-table .delta-dn{color:#3a6ea8;font-size:10px;}
.cmp-table .delta-eq{color:var(--td);font-size:10px;}
.cmp-table tr:nth-child(even) td{background:rgba(0,0,0,.02);}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 20px;color:var(--td);}
.empty-state .ic{font-size:42px;margin-bottom:12px;}
.empty-state h2{font-size:16px;font-weight:600;color:var(--tm);margin-bottom:6px;}
.empty-state p{font-size:13px;line-height:1.6;}

/* ── LOADING ── */
.loading{text-align:center;padding:40px;color:var(--tm);font-size:13px;}
.loading .spin{display:inline-block;animation:sp .7s linear infinite;font-size:22px;margin-bottom:8px;}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:var(--bg);border-radius:var(--r);padding:10px 18px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:92vw;box-shadow:0 6px 24px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#c0392b;}

/* ── CONFIG MODAL ── */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.mov.open{opacity:1;pointer-events:all;}
.mbox{background:var(--s1);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 28px;width:100%;max-height:70vh;overflow-y:auto;}
.mbox h3{font-size:15px;margin-bottom:4px;}
.mbox p{color:var(--tm);font-size:12px;margin-bottom:14px;line-height:1.5;}
.mfi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:9px 11px;font:14px var(--fn);color:var(--tx);outline:none;margin-bottom:10px;}
.mfi:focus{border-color:var(--ac);}
.m-acts{display:flex;gap:8px;margin-top:14px;}
.btn-ms{flex:1;padding:11px;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);font:600 13px var(--fn);cursor:pointer;}
.btn-mp{flex:1;padding:11px;border-radius:var(--r2);border:none;background:var(--tx);color:var(--bg);font:700 13px var(--fn);cursor:pointer;}

/* ── SUMMARY ROW ── */
.sum-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.sum-chip{display:flex;flex-direction:column;align-items:center;background:var(--s2);border-radius:var(--r2);padding:8px 14px;flex:1;min-width:80px;}
.sum-chip .val{font:700 20px var(--mo);color:var(--tx);}
.sum-chip .lbl{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;text-align:center;}
</style>
</head>

</div>

<script>
// ════════════════════════════════════════════════════════════════
//  NORMAL RANGES — ตรงกับ Functional Outcome Report2 / DoctorView
// ════════════════════════════════════════════════════════════════
var FO_NORMALS = {

  fo_pinch:      {label:'Pinch Strength', unit:'kg.',   norm:'≥7 kg.'},

  fo_deadhang:   {label:'Dead Hang',      unit:'วิ',    norm:''},

  fo_sls_close_l:{label:'SLS Close Eyes ซ้าย',unit:'วิ',norm:''},
  fo_sls_close_r:{label:'SLS Close Eyes ขวา',unit:'วิ', norm:''},
  fo_sls_open_l: {label:'SLS Open Eyes ซ้าย',unit:'วิ', norm:''},
  fo_sls_open_r: {label:'SLS Open Eyes ขวา',unit:'วิ',  norm:''},
  fo_chair_r:    {label:'Chair S&R ขวา',  unit:'inch',  norm:'-0.5 – 4.5 inch'},
  fo_chair_l:    {label:'Chair S&R ซ้าย', unit:'inch',  norm:'-0.5 – 4.5 inch'},

  fo_bal_feet:   {label:'4-Stage: Feet Together',unit:'วิ',norm:'10 วิ'},
  fo_bal_sr:     {label:'4-Stage: Semi-tandem ขวา',unit:'วิ',norm:'10 วิ'},
  fo_bal_sl:     {label:'4-Stage: Semi-tandem ซ้าย',unit:'วิ',norm:'10 วิ'},
  fo_bal_tr:     {label:'4-Stage: Tandem ขวา',unit:'วิ',norm:'10 วิ'},
  fo_bal_tl:     {label:'4-Stage: Tandem ซ้าย',unit:'วิ',norm:'10 วิ'},
  fo_sls_r:      {label:'SLS ขวา',         unit:'วิ',    norm:''},
  fo_sls_l:      {label:'SLS ซ้าย',        unit:'วิ',    norm:''},
  fo_bess:       {label:'BESS Score',      unit:'คะแนน', norm:'12–23 คะแนน'},
  fo_ytest:      {label:'Y-Test',          unit:'cm.',   norm:'Compare Pre-Post'},
  fo_romberg:    {label:'Sharpened Romberg',unit:'วิ',   norm:''},
  fo_riskfall:   {label:'Risk to Fall',    unit:'',      norm:''},
  fo_10m:        {label:'10m Walk Test',   unit:'m/s',   norm:'0.8–1.2 m/s'},
  fo_10step:     {label:'10 Step Test',    unit:'วิ',    norm:'5.58–7.78 วิ'},
  fo_tug:        {label:'Timed Up & Go',   unit:'วิ',    norm:'≤12 วิ'},
  fo_qft:        {label:'Quick Feet Test', unit:'วิ',    norm:'4.3–5.0 วิ'},
  fo_ttest:      {label:'T-Test',          unit:'วิ',    norm:'11.51–12.50 วิ'},
  fo_tandemwalk: {label:'Tandem Walk 3m.', unit:'วิ',    norm:''},
  fo_pendulum:   {label:'Pendulum Jump',   unit:'cm.',   norm:''},
  fo_waist:      {label:'Waist',           unit:'cm.',   norm:'≤80 cm.'},
  fo_hip:        {label:'Hip',             unit:'cm.',   norm:''},
  fo_waist_hip:  {label:'Waist-Hip Ratio', unit:'',      norm:'≤0.85'},
};

var FO_SECTIONS = [
  {title:'Cardio',         icon:'❤️',  keys:['fo_2mwt','fo_6mwt','fo_3step']},
  {title:'Strength · Upper',icon:'💪', keys:['fo_grip_r','fo_grip_l','fo_pinch','fo_pushup','fo_biceps','fo_deadhang']},
  {title:'Strength · Core', icon:'🏋️', keys:['fo_plank','fo_wallplank']},
  {title:'Strength · Lower',icon:'🦵', keys:['fo_5sts','fo_30sts','fo_squat','fo_calf']},
  {title:'Flexibility',    icon:'🤸', keys:['fo_chair_r','fo_chair_l','fo_vsit','fo_chest']},
  {title:'Balance · 4-Stage',icon:'⚖️',keys:['fo_bal_feet','fo_bal_sr','fo_bal_sl','fo_bal_tr','fo_bal_tl']},
  {title:'Balance · SLS',  icon:'🧘', keys:['fo_sls_r','fo_sls_l','fo_sls_close_l','fo_sls_close_r','fo_sls_open_l','fo_sls_open_r']},
  {title:'Balance · Other',icon:'📊', keys:['fo_bess','fo_ytest','fo_romberg','fo_riskfall']},
  {title:'Gait & Agility', icon:'🏃', keys:['fo_10m','fo_10step','fo_tug','fo_qft','fo_ttest','fo_tandemwalk','fo_pendulum']},
  {title:'Body Composition',icon:'📏',keys:['fo_waist','fo_hip']},
];

var BR_SECTIONS = [
  {title:'CQ Score',  icon:'🧠', type:'cq'},
  {title:'TAQ Score', icon:'⚡', type:'taq'},
  {title:'MoCA Score',icon:'📋', type:'moca'},
  {title:'FAST',      icon:'📊', type:'fast'},
  {title:'Summary',   icon:'📝', type:'summary'},
];

// ════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════
var state = {
  foVisits: [],   // array of FO rows (sorted by date asc)
  brVisits: [],   // array of Brain rows
  patient: null,  // {name, cn, age, gender}
  foIdx: 0,       // selected FO visit index
  brIdx: 0,       // selected Brain visit index
  activeTab: 'fo'
};

function g(id){ return document.getElementById(id); }
function getCfg(){ try{ return JSON.parse(localStorage.getItem('ahg_rpt_cfg')||'{}'); }catch(e){ return {}; } }
function fmt(v){ return (v===''||v===null||v===undefined) ? '—' : v; }
function fmtNum(v){ if(v===''||v===null||v===undefined) return null; var n=parseFloat(v); return isNaN(n)?null:n; }

// ════════════════════════════════════════════════════════════════
//  LOGO — embedded from form file if available
// ════════════════════════════════════════════════════════════════
(function(){
  // Try to show text logo always visible
  var cfg = getCfg();
  // Logo will be shown from CSS; text fallback is fine
})();

// ════════════════════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════════════════════
async function searchPatient(){
  var cn = g('search-cn').value.trim();
  if(!cn){ toast('กรุณากรอก CN','err'); return; }
  var cfg = getCfg();
  if(!cfg.url){ toast('กรุณาตั้งค่า Script URL ก่อน','err'); openCfg(); return; }

  setState('loading');
  g('btn-search').disabled = true;

  try {
    // 1. Lookup patient info
    var res = await fetch(cfg.url + '?action=lookup&cn=' + encodeURIComponent(cn));
    var info = await res.json();
    if(info.status !== 'found'){
      setState('notfound');
      g('notfound-msg').textContent = 'ไม่พบคนไข้ CN: ' + cn + ' ใน PatientMaster';
      return;
    }

    // 2. Fetch all FO rows for this CN
    var foRes = await fetch(cfg.url + '?action=getAllRows&cn=' + encodeURIComponent(cn) + '&sheet=Data2');
    var foData = await foRes.json();

    // 3. Fetch all Brain rows
    var brRes = await fetch(cfg.url + '?action=getAllRows&cn=' + encodeURIComponent(cn) + '&sheet=Data');
    var brData = await brRes.json();

    state.patient = info;
    state.foVisits = (foData.rows || []).sort(function(a,b){ return a.date > b.date ? 1 : -1; });
    state.brVisits = (brData.rows || []).sort(function(a,b){ return a.date > b.date ? 1 : -1; });
    state.foIdx = Math.max(0, state.foVisits.length - 1);
    state.brIdx = Math.max(0, state.brVisits.length - 1);

    console.log('FO rows:', state.foVisits.length, 'BR rows:', state.brVisits.length);
    if(state.brVisits.length > 0) console.log('BR sample:', JSON.stringify(state.brVisits[0]).substring(0,200));

    setState('result');   // show both tabs first
    renderAll();          // then render content into visible tabs
  } catch(err){
    toast('เชื่อมต่อไม่ได้: ' + err.message, 'err');
    setState('empty');
  } finally {
    g('btn-search').disabled = false;
  }
}

function setState(s){
  g('state-empty').style.display    = s==='empty'   ? '' : 'none';
  g('state-loading').style.display  = s==='loading' ? '' : 'none';
  g('state-notfound').style.display = s==='notfound'? '' : 'none';
  g('report-tabs').style.display    = s==='result'  ? 'flex' : 'none';
  // MUST show both tabs before renderAll so innerHTML writes correctly
  g('tab-fo').style.display = s==='result' ? '' : 'none';
  g('tab-br').style.display = s==='result' ? '' : 'none';
}

// ════════════════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════════════════
function renderAll(){
  // both tabs already visible via setState('result')
  renderPatientCard('fo');
  renderPatientCard('br');
  renderVisitButtons('fo');
  renderVisitButtons('br');
  renderFOBody();
  renderBrBody();
  // now hide inactive tab
  g('tab-fo').style.display = state.activeTab === 'fo' ? '' : 'none';
  g('tab-br').style.display = state.activeTab === 'br' ? '' : 'none';
  // highlight correct button
  document.querySelectorAll('.rtab').forEach(function(b){ b.classList.remove('active-fo','active-br'); });
  var btn = g('rt-' + state.activeTab);
  if(btn) btn.classList.add('active-' + state.activeTab);
}

function renderPatientCard(tab){
  var p = state.patient;
  var visits = tab === 'fo' ? state.foVisits : state.brVisits;
  var ico = p.gender === 'หญิง' ? '👩' : (p.gender === 'ชาย' ? '👨' : '👤');
  var html =
    '<div class="pt-card">' +
    '<div class="pt-ico">' + ico + '</div>' +
    '<div class="pt-info">' +
    '<div class="pt-name">' + escH(p.name || '—') + '</div>' +
    '<div class="pt-meta">' +
    (p.age ? 'อายุ ' + p.age + ' ปี  ·  ' : '') +
    (p.gender || '') + '  ·  <span class="pt-cn">CN: ' + escH(p.cn) + '</span>' +
    '</div>' +
    '</div>' +
    '<div style="text-align:right;font-family:var(--mo);font-size:11px;color:var(--td);">' +
    visits.length + ' ครั้ง' +
    '</div>' +
    '</div>';
  g(tab + '-pt-card').innerHTML = html;
}

function renderVisitButtons(tab){
  var visits = tab === 'fo' ? state.foVisits : state.brVisits;
  var selIdx = tab === 'fo' ? state.foIdx : state.brIdx;
  var html = '';
  if(visits.length === 0){
    html = '<span style="font-size:12px;color:var(--td);">ไม่มีข้อมูล</span>';
  } else {
    visits.forEach(function(v, i){
      var d = v.date ? v.date.substring(0,10) : '?';
      html += '<button class="visit-btn' + (i===selIdx?' active':'') + '" ' +
        'onclick="selectVisit(\'' + tab + '\',' + i + ')">' +
        'ครั้งที่ ' + (v.visit || (i+1)) + '<br><span style="font-size:9px;font-weight:400;">' + d + '</span>' +
        '</button>';
    });
    // Compare all button
    if(visits.length > 1){
      html += '<button class="visit-btn' + (selIdx===-1?' active':'') + '" ' +
        'onclick="selectVisit(\'' + tab + '\',-1)">📊 เปรียบเทียบ</button>';
    }
  }
  g(tab + '-visits').innerHTML = html;
}

function selectVisit(tab, idx){
  if(tab === 'fo'){ state.foIdx = idx; renderFOBody(); }
  else { state.brIdx = idx; renderBrBody(); }
  renderVisitButtons(tab);
}

// ─── FO BODY ───
function renderFOBody(){
  var visits = state.foVisits;
  if(visits.length === 0){
    g('fo-body').innerHTML = '<div class="empty-state" style="padding:30px"><div class="ic">📋</div><h2>ไม่มีข้อมูล FO</h2></div>';
    return;
  }

  var idx = state.foIdx;
  if(idx === -1){
    g('fo-body').innerHTML = renderFOCompare(visits);
    return;
  }

  var row = visits[idx];
  var html = '';

  // Date + Visit chip
  html += '<div style="font-size:11px;color:var(--td);font-family:var(--mo);margin-bottom:12px;">' +
    'วันที่ ' + (row.date||'—').substring(0,10) + '  ·  ครั้งที่ ' + (row.visit||'—') + '</div>';

  // Vital signs summary strip
  if(row.fo_bp_pre || row.fo_hr_pre || row.fo_spo2_pre){
    html += renderVital(row);
  }

  // Fall risk + Suggestion
  html += '<div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">';
  if(row.fo_riskfall){
    var rc = row.fo_riskfall === 'High' ? '#d4531a' : '#3a6ea8';
    html += '<div style="background:rgba(0,0,0,.04);border-radius:var(--r2);padding:7px 12px;font-size:12px;">' +
      'Fall Risk: <strong style="color:' + rc + '">' + row.fo_riskfall + '</strong></div>';
  }
  if(row.fo_suggestion){
    html += '<div style="background:rgba(92,122,92,.08);border-radius:var(--r2);padding:7px 12px;font-size:12px;flex:1;">' +
      '📝 ' + escH(row.fo_suggestion) + '</div>';
  }
  html += '</div>';

  // Sections
  FO_SECTIONS.forEach(function(sec){
    var rows = '';
    sec.keys.forEach(function(k){
      if(k === 'fo_riskfall') return; // shown above
      var def = FO_NORMALS[k];
      if(!def) return;
      var val = row[k];
      var display = (val !== '' && val !== null && val !== undefined) ? val : null;
      rows += '<div class="test-row">' +
        '<div class="test-name">' + def.label + (def.unit ? '<div class="sub">' + def.unit + '</div>' : '') + '</div>' +
        '<div class="test-norm">' + (def.norm || '') + '</div>' +
        '<div class="test-val' + (display===null?' empty':'') + '">' + (display!==null ? display : '—') + '</div>' +
        '</div>';
    });
    if(!rows) return;
    html += '<div class="sec"><div class="sec-head">' +
      '<div class="sec-ico ic-card">' + sec.icon + '</div>' +
      '<div class="sec-title">' + sec.title + '</div></div>' +
      '<div class="sec-body">' + rows + '</div></div>';
  });

  // Note
  if(row.fo_note && row.fo_note.trim()){
    html += '<div class="sec"><div class="sec-head"><div class="sec-ico ic-sand">📝</div><div class="sec-title">Note</div></div>' +
      '<div class="sec-body" style="font-size:13px;line-height:1.7;color:var(--tm)">' + escH(row.fo_note) + '</div></div>';
  }

  g('fo-body').innerHTML = html;
}

function renderVital(row){
  var html = '<div class="sec" style="margin-bottom:12px;"><div class="sec-head"><div class="sec-ico ic-rose">🩺</div><div class="sec-title">Vital Signs</div></div><div class="sec-body"><table class="vital-table"><thead><tr><th></th><th>BP</th><th>HR</th><th>SpO2</th></tr></thead><tbody>';
  var rows = [
    ['ก่อน','fo_bp_pre','fo_hr_pre','fo_spo2_pre'],
    ['หลัง','fo_bp_post','fo_hr_post','fo_spo2_post'],
    ['+3min','fo_bp_post3','fo_hr_post3','fo_spo2_post3'],
  ];
  rows.forEach(function(r){
    var bp = row[r[1]], hr = row[r[2]], sp = row[r[3]];
    if(!bp && !hr && !sp) return;
    html += '<tr><td class="vt-label">' + r[0] + '</td>' +
      '<td>' + fmt(bp) + '</td>' +
      '<td>' + fmt(hr) + '</td>' +
      '<td>' + fmt(sp) + '</td></tr>';
  });
  html += '</tbody></table></div></div>';
  return html;
}

function renderFOCompare(visits){
  // Show all visits side-by-side for key tests
  var keyTests = ['fo_2mwt','fo_grip_r','fo_grip_l','fo_tug','fo_10m','fo_bal_feet','fo_30sts','fo_waist','fo_hip'];
  var html = '<div class="sec"><div class="sec-head"><div class="sec-ico ic-card">📊</div><div class="sec-title">เปรียบเทียบทุกครั้ง</div></div><div class="sec-body">';
  html += '<table class="cmp-table"><thead><tr><th class="name-col">Test</th>';
  visits.forEach(function(v,i){
    html += '<th>ครั้ง' + (v.visit||i+1) + '<br><span style="font-weight:400;font-size:9px;">' + (v.date||'').substring(0,10) + '</span></th>';
  });
  html += '</tr></thead><tbody>';
  keyTests.forEach(function(k){
    var def = FO_NORMALS[k]; if(!def) return;
    html += '<tr><td class="name-col">' + def.label + '</td>';
    var vals = visits.map(function(v){ return fmtNum(v[k]); });
    vals.forEach(function(val, i){
      var delta = '';
      if(i > 0 && val !== null && vals[i-1] !== null){
        var d = val - vals[i-1];
        delta = d > 0 ? '<span class="delta-up"> ▲' + Math.abs(d).toFixed(1) + '</span>'
               : d < 0 ? '<span class="delta-dn"> ▼' + Math.abs(d).toFixed(1) + '</span>'
               : '<span class="delta-eq"> —</span>';
      }
      html += '<td>' + (val!==null ? val : '—') + delta + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  return html;
}

// ─── BRAIN BODY ───
function renderBrBody(){
  var visits = state.brVisits;
  if(visits.length === 0){
    g('br-body').innerHTML = '<div class="empty-state" style="padding:30px"><div class="ic">🧠</div><h2>ไม่มีข้อมูล Brain Test</h2></div>';
    return;
  }

  var idx = state.brIdx;
  if(idx === -1){
    g('br-body').innerHTML = renderBrCompare(visits);
    return;
  }

  var row = visits[idx];
  var html = '';

  // Date chip
  html += '<div style="font-size:11px;color:var(--td);font-family:var(--mo);margin-bottom:12px;">' +
    'วันที่ ' + (row.date||'—').substring(0,10) + '  ·  ครั้งที่ ' + (row.visit||'—') + '</div>';

  // CQ Score
  html += '<div class="sec"><div class="sec-head"><div class="sec-ico ic-brain">🧠</div><div class="sec-title">CQ Score</div></div><div class="sec-body">';
  var cqOverall = fmtNum(row.br_cq_overall);
  var cqInterp = cqOverall===null ? '' : cqOverall<2 ? 'Very Low' : cqOverall<9 ? 'Low' : cqOverall<25 ? 'Low Average' : cqOverall<75 ? 'Average' : 'Above Average';
  var cqColor = cqOverall===null ? 'var(--td)' : cqOverall<25 ? 'var(--hi)' : cqOverall<75 ? '#8a7a00' : 'var(--no)';
  html += '<div class="cq-grid">';
  [['Executive Function','br_cq_exf'],['Memory','br_cq_mem'],['Processing Speed','br_cq_ps']].forEach(function(p){
    var v = fmtNum(row[p[1]]);
    html += '<div class="cq-card"><div class="cq-label">' + p[0] + '</div>' +
      '<div class="cq-score">' + (v!==null?v:'—') + '<span class="unit">%</span></div></div>';
  });
  html += '<div class="cq-card" style="background:rgba(92,122,92,.08)"><div class="cq-label">Overall</div>' +
    '<div class="cq-score" style="color:' + cqColor + '">' + (cqOverall!==null?cqOverall:'—') + '<span class="unit">%</span></div>' +
    '<div class="cq-interp" style="color:' + cqColor + '">' + cqInterp + '</div></div>';
  html += '</div></div></div>';

  // TAQ
  var taq = fmtNum(row.br_taq);
  var taqInterp = taq===null ? '' : taq<=3 ? 'Normal' : taq<=12 ? 'MCI' : 'Dementia';
  var taqColor = taq===null ? 'var(--td)' : taq<=3 ? 'var(--no)' : taq<=12 ? '#8a7a00' : 'var(--hi)';
  html += '<div class="sec"><div class="sec-head"><div class="sec-ico ic-brain">⚡</div><div class="sec-title">TAQ Score</div></div><div class="sec-body">';
  html += '<div style="display:flex;align-items:center;gap:14px;">' +
    '<div style="font:700 36px var(--mo);color:' + taqColor + '">' + (taq!==null?taq:'—') + '</div>' +
    '<div><div style="font-size:14px;font-weight:700;color:' + taqColor + '">' + taqInterp + '</div>' +
    '<div style="font-size:11px;color:var(--td);margin-top:2px;">Normal: 0–3 · MCI: 4–12 · Dementia: >12</div></div></div>';
  html += '</div></div>';

  // MoCA
  var mocaOverall = fmtNum(row.br_moca_overall);
  var mocaInterp = mocaOverall===null ? '' : mocaOverall>=28 ? 'Normal' : mocaOverall>=19 ? 'MCI' : 'Dementia';
  var mocaColor = mocaOverall===null ? 'var(--td)' : mocaOverall>=28 ? 'var(--no)' : mocaOverall>=19 ? '#8a7a00' : 'var(--hi)';
  html += '<div class="sec"><div class="sec-head"><div class="sec-ico ic-brain">📋</div><div class="sec-title">MoCA Score</div></div><div class="sec-body">';
  var mocaFields = [
    ['Visuospatial / Executive','br_moca_vis','5'],
    ['Naming','br_moca_nam','3'],
    ['Attention','br_moca_att','6'],
    ['Language','br_moca_lang','3'],
    ['Abstraction','br_moca_abs','2'],
    ['Delayed Recall','br_moca_del','5'],
    ['Orientation','br_moca_ori','6'],
  ];
  mocaFields.forEach(function(mf){
    var v = fmtNum(row[mf[1]]);
    html += '<div class="moca-row"><div>' + mf[0] + '</div><div class="moca-max">/' + mf[2] + '</div><div class="moca-score">' + (v!==null?v:'—') + '</div></div>';
  });
  html += '<div style="margin-top:10px;display:flex;align-items:center;gap:10px;">' +
    '<div style="font-size:11px;color:var(--td);">Total</div>' +
    '<div style="font:700 28px var(--mo);color:' + mocaColor + '">' + (mocaOverall!==null?mocaOverall:'—') + '<span style="font-size:13px;font-weight:400;color:var(--td)">/30</span></div>' +
    '<div style="font-size:13px;font-weight:700;color:' + mocaColor + '">' + mocaInterp + '</div></div>';
  html += '</div></div>';

  // FAST
  if(row.br_fast){
    html += '<div class="sec"><div class="sec-head"><div class="sec-ico ic-brain">📊</div><div class="sec-title">FAST Stage</div></div><div class="sec-body">' +
      '<div class="fast-chip">📊 ' + escH(row.br_fast) + '</div></div></div>';
  }

  // Summary / Suggestion
  if(row.br_summary || row.br_suggestion){
    html += '<div class="sec"><div class="sec-head"><div class="sec-ico ic-sand">📝</div><div class="sec-title">Summary / Suggestion</div></div><div class="sec-body">';
    if(row.br_summary) html += '<div style="font-size:13px;font-weight:600;margin-bottom:6px;">' + escH(row.br_summary) + '</div>';
    if(row.br_suggestion) html += '<div style="font-size:12px;color:var(--tm);line-height:1.7">' + escH(row.br_suggestion) + '</div>';
    html += '</div></div>';
  }

  g('br-body').innerHTML = html;
}

function renderBrCompare(visits){
  var html = '<div class="sec"><div class="sec-head"><div class="sec-ico ic-brain">📊</div><div class="sec-title">เปรียบเทียบทุกครั้ง</div></div><div class="sec-body">';
  html += '<table class="cmp-table"><thead><tr><th class="name-col">Test</th>';
  visits.forEach(function(v,i){
    html += '<th>ครั้ง' + (v.visit||i+1) + '<br><span style="font-weight:400;font-size:9px;">' + (v.date||'').substring(0,10) + '</span></th>';
  });
  html += '</tr></thead><tbody>';
  var cmpFields = [
    ['CQ: Exec','br_cq_exf'],['CQ: Memory','br_cq_mem'],['CQ: Processing','br_cq_ps'],['CQ Overall','br_cq_overall'],
    ['TAQ','br_taq'],['MoCA Total','br_moca_overall'],
  ];
  cmpFields.forEach(function(p){
    html += '<tr><td class="name-col">' + p[0] + '</td>';
    var vals = visits.map(function(v){ return fmtNum(v[p[1]]); });
    vals.forEach(function(val, i){
      var delta = '';
      if(i > 0 && val !== null && vals[i-1] !== null){
        var d = val - vals[i-1];
        delta = d > 0 ? '<span class="delta-up"> ▲' + Math.abs(d).toFixed(1) + '</span>'
               : d < 0 ? '<span class="delta-dn"> ▼' + Math.abs(d).toFixed(1) + '</span>'
               : '<span class="delta-eq"> —</span>';
      }
      html += '<td>' + (val!==null ? val : '—') + delta + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';
  return html;
}

// ════════════════════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════════════════════
function switchReport(t, btn){
  state.activeTab = t;
  document.querySelectorAll('.rtab').forEach(function(b){ b.classList.remove('active-fo','active-br'); });
  if(btn) btn.classList.add('active-'+t);
  // show the target tab first, render into it, then hide other
  g('tab-fo').style.display = '';
  g('tab-br').style.display = '';
  if(t === 'fo') renderFOBody();
  else            renderBrBody();
  g('tab-fo').style.display = t==='fo' ? '' : 'none';
  g('tab-br').style.display = t==='br' ? '' : 'none';
}

// ════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════
function openCfg(){
  var c = getCfg();
  g('cfg-url').value = c.url || '';
  g('mmodal').classList.add('open');
}
function closeCfg(){ g('mmodal').classList.remove('open'); }
function saveCfg(){
  var url = g('cfg-url').value.trim();
  localStorage.setItem('ahg_rpt_cfg', JSON.stringify({url: url}));
  closeCfg();
  toast('บันทึกแล้ว', 'ok');
}
g('mmodal').addEventListener('click', function(e){ if(e.target===this) closeCfg(); });

// ════════════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════════════
function toast(msg, type){
  var t = g('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'ok') + ' show';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

function escH(s){
  if(!s) return '';
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Auto-open config if not set
window.addEventListener('DOMContentLoaded', function(){
  var c = getCfg();
  if(!c.url){
    // show gentle hint
    setTimeout(openCfg, 500);
  }
});
</script>
