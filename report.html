<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AHG - Patient Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f2;--s1:#fff;--s2:#f0ece6;--s3:#e8e2da;
  --bd:#ddd7cf;--bd2:#c8c0b4;
  --tx:#2c2820;--tm:#7a7268;--td:#b0a898;
  --ac:#5c7a5c;--ac2:rgba(92,122,92,.12);
  --hi:#d4531a;--lo:#3a6ea8;--ok:#5c7a5c;
  --r:10px;--r2:7px;
  --fn:"Sarabun",sans-serif;--mo:"IBM Plex Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;}
.tb{background:var(--s1);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 5px rgba(0,0,0,.06);}
.tb img{height:32px;width:auto;}
.tb-t{font-size:13px;font-weight:600;color:var(--tm);flex:1;}
.tb-cfg{background:none;border:none;color:var(--td);font:12px var(--fn);cursor:pointer;text-decoration:underline;}
.sb{padding:12px 14px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;gap:8px;}
.sb input{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:9px 12px;font:14px var(--fn);color:var(--tx);outline:none;}
.sb input:focus{border-color:var(--ac);}
.sb input::placeholder{color:var(--td);}
.sb button{padding:9px 18px;background:var(--tx);color:var(--bg);border:none;border-radius:var(--r2);font:600 13px var(--fn);cursor:pointer;}
.sb button:disabled{opacity:.5;}
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bd);}
.tabs button{flex:1;padding:10px 0;border:none;background:transparent;font:600 13px var(--fn);color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;}
.tabs button.afo{color:var(--ac);border-color:var(--ac);}
.tabs button.abr{color:#8b6f4e;border-color:#8b6f4e;}
.wrap{max-width:780px;margin:0 auto;padding:14px 12px 60px;}
/* states */
.st-empty,.st-loading,.st-nf{text-align:center;padding:48px 16px;color:var(--td);}
.st-empty .ic,.st-loading .ic,.st-nf .ic{font-size:40px;margin-bottom:10px;}
.st-empty h2,.st-nf h2{font-size:15px;font-weight:600;color:var(--tm);margin-bottom:6px;}
.st-loading{color:var(--tm);}
.spin{display:inline-block;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
/* pane */
.pane{display:none;}
.pane.show{display:block;}
/* patient card */
.ptc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.ptc-ico{font-size:30px;}
.ptc-info{flex:1;}
.ptc-name{font-size:16px;font-weight:700;}
.ptc-meta{font-size:11px;color:var(--tm);margin-top:2px;}
.ptc-cn{font-family:var(--mo);font-size:10px;color:var(--td);background:var(--s2);padding:2px 6px;border-radius:4px;}
/* visit bar */
.vbar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;}
.vbtn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bd);background:var(--s1);font:600 11px var(--mo);color:var(--tm);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.vbtn.on{background:var(--tx);border-color:var(--tx);color:var(--bg);}
/* section */
.sec{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.sec-h{padding:10px 13px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;}
.sec-ic{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--ac2);color:var(--ac);}
.sec-t{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--tm);}
.sec-b{padding:10px 13px;}
/* test row */
.tr{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:13px;}
.tr:last-child{border-bottom:none;}
.tr-n .sub{font-size:10px;color:var(--td);}
.tr-norm{font-size:10px;color:var(--td);text-align:right;}
.tr-v{font-family:var(--mo);font-weight:600;text-align:right;min-width:55px;}
.tr-v.nil{color:var(--td);font-weight:400;}
/* CQ cards */
.cq-g{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.cq-c{background:var(--s2);border-radius:var(--r2);padding:10px 12px;}
.cq-l{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--td);margin-bottom:4px;}
.cq-v{font:700 22px var(--mo);}
.cq-v .u{font-size:11px;font-weight:400;color:var(--tm);}
/* moca */
.mr{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid var(--bd);font-size:12px;}
.mr:last-child{border-bottom:none;}
.mr-s{font-family:var(--mo);font-weight:600;text-align:right;}
.mr-m{font-size:10px;color:var(--td);}
/* vital */
.vt{width:100%;border-collapse:collapse;font-size:12px;}
.vt th{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--td);text-align:center;padding:4px 6px;background:var(--s2);}
.vt td{padding:6px 8px;text-align:center;font-family:var(--mo);border-top:1px solid var(--bd);}
.vt .vl{text-align:left;font-family:var(--fn);color:var(--tm);font-size:11px;font-weight:600;}
/* compare table */
.ct{width:100%;border-collapse:collapse;font-size:12px;}
.ct th{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--td);text-align:center;padding:5px 6px;background:var(--s2);border:1px solid var(--bd);}
.ct td{padding:5px 7px;border:1px solid var(--bd);text-align:center;font-family:var(--mo);}
.ct .nc{text-align:left;font-family:var(--fn);color:var(--tm);font-size:11px;}
.du{color:var(--hi);font-size:10px;}
.dd{color:var(--lo);font-size:10px;}
.de{color:var(--td);font-size:10px;}
/* fast */
.fast{display:inline-flex;align-items:center;gap:8px;background:rgba(175,159,140,.12);border:1px solid rgba(175,159,140,.3);border-radius:var(--r2);padding:10px 14px;font-size:13px;font-weight:600;}
/* toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:var(--bg);border-radius:var(--r);padding:9px 16px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:92vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#c0392b;}
/* modal */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.mov.open{opacity:1;pointer-events:all;}
.mbox{background:var(--s1);border-radius:var(--r) var(--r) 0 0;padding:20px 16px 28px;width:100%;}
.mbox h3{font-size:15px;margin-bottom:4px;}
.mbox p{color:var(--tm);font-size:12px;margin-bottom:12px;}
.mfi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:var(--r2);padding:9px 11px;font:14px var(--fn);color:var(--tx);outline:none;margin-top:4px;margin-bottom:10px;display:block;}
.mfi:focus{border-color:var(--ac);}
.ma{display:flex;gap:8px;margin-top:12px;}
.bms{flex:1;padding:10px;border-radius:var(--r2);border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);font:600 13px var(--fn);cursor:pointer;}
.bmp{flex:1;padding:10px;border-radius:var(--r2);border:none;background:var(--tx);color:var(--bg);font:700 13px var(--fn);cursor:pointer;}
</style>
</head>

  fo_bal_tl:{l:'Balance: Tandem ซ้าย',u:'วิ',n:'10 วิ'},
  fo_sls_r:{l:'SLS ขวา',u:'วิ',n:''},
  fo_sls_l:{l:'SLS ซ้าย',u:'วิ',n:''},
  fo_sls_close_l:{l:'Close Eyes ซ้าย',u:'วิ',n:''},
  fo_sls_close_r:{l:'Close Eyes ขวา',u:'วิ',n:''},
  fo_sls_open_l:{l:'Open Eyes ซ้าย',u:'วิ',n:''},
  fo_sls_open_r:{l:'Open Eyes ขวา',u:'วิ',n:''},
  fo_bess:{l:'BESS Score',u:'คะแนน',n:'12-23'},
  fo_ytest:{l:'Y-Test',u:'cm.',n:'Pre-Post'},
  fo_romberg:{l:'Sharpened Romberg',u:'วิ',n:''},

var FO_SECS = [
  {t:'Cardio',k:['fo_2mwt','fo_6mwt','fo_3step']},
  {t:'Strength - Upper',k:['fo_grip_r','fo_grip_l','fo_pinch','fo_pushup','fo_biceps','fo_deadhang']},

  {t:'Balance - SLS',k:['fo_sls_r','fo_sls_l','fo_sls_close_l','fo_sls_close_r','fo_sls_open_l','fo_sls_open_r']},
  {t:'Balance - Other',k:['fo_bess','fo_ytest','fo_romberg','fo_riskfall']},

// ─── SEARCH ───
async function searchPt(){
  var cn = g('s-cn').value.trim();
  if(!cn){ toast('กรุณากรอก CN','err'); return; }
  var cfg = getCfg();
  if(!cfg.url){ toast('กรุณาตั้งค่า Script URL','err'); openCfg(); return; }
  showState('loading'); g('s-btn').disabled=true;
  try{
    var r1 = await fetch(cfg.url+'?action=lookup&cn='+encodeURIComponent(cn));
    var d1 = await r1.json();
    if(d1.status !== 'found'){ showState('nf'); g('st-nf-msg').textContent='ไม่พบ CN: '+cn; return; }

    var r2 = await fetch(cfg.url+'?action=getAllRows&cn='+encodeURIComponent(cn)+'&sheet=Data2');
    var d2 = await r2.json();

    var r3 = await fetch(cfg.url+'?action=getAllRows&cn='+encodeURIComponent(cn)+'&sheet=Data');
    var d3 = await r3.json();

    S.patient = d1;
    S.fo = (d2.rows||[]).sort(function(a,b){return a.date>b.date?1:-1;});
    S.br = (d3.rows||[]).sort(function(a,b){return a.date>b.date?1:-1;});
    S.foIdx = Math.max(0, S.fo.length-1);
    S.brIdx = Math.max(0, S.br.length-1);
    S.tab = 'fo';

    showState('result');
    renderPtCard('fo'); renderPtCard('br');
    renderVBar('fo');   renderVBar('br');
    renderFO();
    renderBR();
    // activate FO tab by default
    g('pane-fo').className='pane show';
    g('pane-br').className='pane';
    g('tb-fo').className='afo';
    g('tb-br').className='';
  }catch(err){
    toast('เชื่อมต่อไม่ได้: '+err.message,'err');
    showState('empty');
  }finally{
    g('s-btn').disabled=false;
  }
}

function showState(s){
  g('st-empty').style.display   = s==='empty'  ?'':'none';
  g('st-loading').style.display = s==='loading'?'':'none';
  g('st-nf').style.display      = s==='nf'     ?'':'none';
  g('result').style.display     = s==='result' ?'':'none';
}

// ─── TAB SWITCH ───
function switchTab(t){
  S.tab=t;
  g('pane-fo').className = t==='fo'?'pane show':'pane';
  g('pane-br').className = t==='br'?'pane show':'pane';
  g('tb-fo').className   = t==='fo'?'afo':'';
  g('tb-br').className   = t==='br'?'abr':'';
  if(t==='fo') renderFO(); else renderBR();
}

// ─── PATIENT CARD ───
function renderPtCard(t){
  var p=S.patient, visits=t==='fo'?S.fo:S.br;
  var ico=p.gender==='หญิง'?'👩':p.gender==='ชาย'?'👨':'👤';
  g(t+'-ptc').innerHTML=
    '<div class="ptc"><div class="ptc-ico">'+ico+'</div>'+
    '<div class="ptc-info"><div class="ptc-name">'+esc(p.name||'—')+'</div>'+
    '<div class="ptc-meta">'+(p.age?'อายุ '+p.age+' ปี &nbsp;':'')+esc(p.gender||'')+
    ' &nbsp;<span class="ptc-cn">CN: '+esc(p.cn)+'</span></div></div>'+
    '<div style="font-family:var(--mo);font-size:11px;color:var(--td)">'+visits.length+' ครั้ง</div></div>';
}

// ─── VISIT BUTTONS ───
function renderVBar(t){
  var visits=t==='fo'?S.fo:S.br, idx=t==='fo'?S.foIdx:S.brIdx;
  var h='';
  visits.forEach(function(v,i){
    var d=(v.date||'').substring(0,10);
    h+='<button class="vbtn'+(i===idx?' on':'')+(idx===-1&&i===visits.length?' on':'')+
       '" onclick="selVisit(''+t+'','+i+')">ครั้ง '+(v.visit||i+1)+
       '<br><span style="font-size:9px;font-weight:400">'+d+'</span></button>';
  });
  if(visits.length>1){
    h+='<button class="vbtn'+(idx===-1?' on':'')+'" onclick="selVisit(''+t+'',-1)">📊 เปรียบเทียบ</button>';
  }
  g(t+'-vbar').innerHTML=h;
}

function selVisit(t,i){
  if(t==='fo'){S.foIdx=i;renderFO();}else{S.brIdx=i;renderBR();}
  renderVBar(t);
}

// ─── FO RENDER ───
function renderFO(){
  if(S.fo.length===0){g('fo-body').innerHTML='<div class="st-empty"><div class="ic">📋</div><h2>ไม่มีข้อมูล FO</h2></div>';return;}
  if(S.foIdx===-1){g('fo-body').innerHTML=renderFOCmp();return;}
  var row=S.fo[S.foIdx], h='';
  h+='<div style="font-size:11px;color:var(--td);font-family:var(--mo);margin-bottom:10px">'+
     'วันที่ '+(row.date||'—').substring(0,10)+'  ·  ครั้งที่ '+(row.visit||'—')+'</div>';
  // Vital
  if(row.fo_bp_pre||row.fo_hr_pre||row.fo_spo2_pre) h+=renderVital(row);
  // Risk + Suggestion
  var tags='';
  if(row.fo_riskfall) tags+='<span style="background:rgba(0,0,0,.05);border-radius:var(--r2);padding:5px 10px;font-size:12px">Fall Risk: <b style="color:'+(row.fo_riskfall==='High'?'var(--hi)':'var(--lo)')+'">'+esc(row.fo_riskfall)+'</b></span>';
  if(row.fo_suggestion) tags+='<span style="background:var(--ac2);border-radius:var(--r2);padding:5px 10px;font-size:12px;flex:1">'+esc(row.fo_suggestion)+'</span>';
  if(tags) h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">'+tags+'</div>';
  // Sections
  FO_SECS.forEach(function(sec){
    var rows='';
    sec.k.forEach(function(k){
      var def=NR[k]; if(!def) return;
      var v=row[k], hasVal=(v!==''&&v!==null&&v!==undefined&&v!=='');
      rows+='<div class="tr"><div class="tr-n">'+def.l+(def.u?'<div class="sub">'+def.u+'</div>':'')+'</div>'+
            '<div class="tr-norm">'+esc(def.n)+'</div>'+
            '<div class="tr-v'+(hasVal?'':' nil')+'">'+(hasVal?esc(v):'—')+'</div></div>';
    });
    if(!rows) return;
    h+='<div class="sec"><div class="sec-h"><div class="sec-ic">📊</div><div class="sec-t">'+esc(sec.t)+'</div></div><div class="sec-b">'+rows+'</div></div>';
  });
  if(row.fo_note&&row.fo_note.trim()){
    h+='<div class="sec"><div class="sec-h"><div class="sec-ic">📝</div><div class="sec-t">Note</div></div>'+
       '<div class="sec-b" style="font-size:13px;line-height:1.7;color:var(--tm)">'+esc(row.fo_note)+'</div></div>';
  }
  g('fo-body').innerHTML=h;
}

function renderVital(row){
  var h='<div class="sec" style="margin-bottom:10px"><div class="sec-h"><div class="sec-ic">🩺</div><div class="sec-t">Vital Signs</div></div><div class="sec-b">'+
        '<table class="vt"><thead><tr><th></th><th>BP</th><th>HR</th><th>SpO2</th></tr></thead><tbody>';
  [['ก่อน','fo_bp_pre','fo_hr_pre','fo_spo2_pre'],
   ['หลัง','fo_bp_post','fo_hr_post','fo_spo2_post'],
   ['+3min','fo_bp_post3','fo_hr_post3','fo_spo2_post3']].forEach(function(r){
    var bp=row[r[1]],hr=row[r[2]],sp=row[r[3]];
    if(!bp&&!hr&&!sp) return;
    h+='<tr><td class="vl">'+r[0]+'</td><td>'+(bp||'—')+'</td><td>'+(hr||'—')+'</td><td>'+(sp||'—')+'</td></tr>';
  });
  return h+'</tbody></table></div></div>';
}

function renderFOCmp(){
  var keys=['fo_2mwt','fo_grip_r','fo_grip_l','fo_tug','fo_10m','fo_bal_feet','fo_30sts','fo_waist','fo_hip'];
  var h='<div class="sec"><div class="sec-h"><div class="sec-ic">📊</div><div class="sec-t">เปรียบเทียบทุกครั้ง</div></div><div class="sec-b" style="overflow-x:auto">'+
        '<table class="ct"><thead><tr><th class="nc">Test</th>';
  S.fo.forEach(function(v,i){h+='<th>ครั้ง'+(v.visit||i+1)+'<br><span style="font-size:9px;font-weight:400">'+(v.date||'').substring(0,10)+'</span></th>';});
  h+='</tr></thead><tbody>';
  keys.forEach(function(k){
    var def=NR[k]; if(!def) return;
    h+='<tr><td class="nc">'+def.l+'</td>';
    var vals=S.fo.map(function(v){return numVal(v[k]);});
    vals.forEach(function(val,i){
      var dlt='';
      if(i>0&&val!==null&&vals[i-1]!==null){var d=val-vals[i-1];dlt=d>0?'<span class="du"> +'+Math.abs(d).toFixed(1)+'</span>':d<0?'<span class="dd"> -'+Math.abs(d).toFixed(1)+'</span>':'<span class="de"> =</span>';}
      h+='<td>'+(val!==null?val:'—')+dlt+'</td>';
    });
    h+='</tr>';
  });
  return h+'</tbody></table></div></div>';
}

// ─── BRAIN RENDER ───
function renderBR(){
  if(S.br.length===0){g('br-body').innerHTML='<div class="st-empty"><div class="ic">🧠</div><h2>ไม่มีข้อมูล Brain Test</h2></div>';return;}
  if(S.brIdx===-1){g('br-body').innerHTML=renderBRCmp();return;}
  var row=S.br[S.brIdx], h='';

  h+='<div style="font-size:11px;color:var(--td);font-family:var(--mo);margin-bottom:10px">'+
     'วันที่ '+(row.date||'—').substring(0,10)+'  ·  ครั้งที่ '+(row.visit||'—')+'</div>';

  // CQ Score
  var cqo=numVal(row.br_cq_overall);
  var cqInterp=cqo===null?'':cqo<25?'Low':cqo<75?'Average':'Above Average';
  var cqColor=cqo===null?'var(--td)':cqo<25?'var(--hi)':cqo<75?'#8a7a00':'var(--ok)';
  h+='<div class="sec"><div class="sec-h"><div class="sec-ic">🧠</div><div class="sec-t">CQ Score</div></div><div class="sec-b">'+
     '<div class="cq-g">';
  [['Executive Function','br_cq_exf'],['Memory','br_cq_mem'],['Processing Speed','br_cq_ps']].forEach(function(p){
    var v=numVal(row[p[1]]);
    h+='<div class="cq-c"><div class="cq-l">'+p[0]+'</div><div class="cq-v">'+(v!==null?v:'—')+'<span class="u">%</span></div></div>';
  });
  h+='<div class="cq-c" style="background:rgba(92,122,92,.08)"><div class="cq-l">CQ Overall</div>'+
     '<div class="cq-v" style="color:'+cqColor+'">'+(cqo!==null?cqo:'—')+'<span class="u">%</span></div>'+
     '<div style="font-size:11px;color:'+cqColor+'">'+cqInterp+'</div></div>'+
     '</div></div></div>';

  // TAQ
  var taq=numVal(row.br_taq);
  var taqT=taq===null?'':taq<=3?'Normal':taq<=12?'MCI':'Dementia';
  var taqC=taq===null?'var(--td)':taq<=3?'var(--ok)':taq<=12?'#8a7a00':'var(--hi)';
  h+='<div class="sec"><div class="sec-h"><div class="sec-ic">⚡</div><div class="sec-t">TAQ Score</div></div><div class="sec-b">'+
     '<div style="display:flex;align-items:center;gap:14px">'+
     '<div style="font:700 34px var(--mo);color:'+taqC+'">'+(taq!==null?taq:'—')+'</div>'+
     '<div><div style="font-size:14px;font-weight:700;color:'+taqC+'">'+taqT+'</div>'+
     '<div style="font-size:11px;color:var(--td);margin-top:2px">Normal ≤3 · MCI 4-12 · Dementia >12</div></div></div>'+
     '</div></div>';

  // MoCA
  var mo=numVal(row.br_moca_overall);
  var moT=mo===null?'':mo>=26?'Normal':mo>=19?'MCI':'Dementia';
  var moC=mo===null?'var(--td)':mo>=26?'var(--ok)':mo>=19?'#8a7a00':'var(--hi)';
  h+='<div class="sec"><div class="sec-h"><div class="sec-ic">📋</div><div class="sec-t">MoCA Score</div></div><div class="sec-b">';
  [['Visuospatial / Executive','br_moca_vis','5'],
   ['Naming','br_moca_nam','3'],
   ['Attention','br_moca_att','6'],
   ['Language','br_moca_lang','3'],
   ['Abstraction','br_moca_abs','2'],
   ['Delayed Recall','br_moca_del','5'],
   ['Orientation','br_moca_ori','6']].forEach(function(m){
    var v=numVal(row[m[1]]);
    h+='<div class="mr"><div>'+m[0]+'</div><div class="mr-m">/'+m[2]+'</div><div class="mr-s">'+(v!==null?v:'—')+'</div></div>';
  });
  h+='<div style="display:flex;align-items:center;gap:10px;margin-top:10px">'+
     '<span style="font-size:11px;color:var(--td)">Total</span>'+
     '<span style="font:700 26px var(--mo);color:'+moC+'">'+(mo!==null?mo:'—')+'</span>'+
     '<span style="font-size:12px;color:var(--td)">/30</span>'+
     '<span style="font-size:13px;font-weight:700;color:'+moC+'">'+moT+'</span></div>';
  h+='</div></div>';

  // FAST
  if(row.br_fast&&row.br_fast.trim()){
    h+='<div class="sec"><div class="sec-h"><div class="sec-ic">📊</div><div class="sec-t">FAST Stage</div></div>'+
       '<div class="sec-b"><div class="fast">'+esc(row.br_fast)+'</div></div></div>';
  }

  // Summary
  if(row.br_summary||row.br_suggestion){
    h+='<div class="sec"><div class="sec-h"><div class="sec-ic">📝</div><div class="sec-t">Summary / Suggestion</div></div><div class="sec-b">';
    if(row.br_summary) h+='<div style="font-size:13px;font-weight:600;margin-bottom:6px">'+esc(row.br_summary)+'</div>';
    if(row.br_suggestion) h+='<div style="font-size:12px;color:var(--tm);line-height:1.7">'+esc(row.br_suggestion)+'</div>';
    h+='</div></div>';
  }

  g('br-body').innerHTML=h;
}

function renderBRCmp(){
  var h='<div class="sec"><div class="sec-h"><div class="sec-ic">📊</div><div class="sec-t">เปรียบเทียบทุกครั้ง</div></div><div class="sec-b" style="overflow-x:auto">'+
        '<table class="ct"><thead><tr><th class="nc">Test</th>';
  S.br.forEach(function(v,i){h+='<th>ครั้ง'+(v.visit||i+1)+'<br><span style="font-size:9px;font-weight:400">'+(v.date||'').substring(0,10)+'</span></th>';});
  h+='</tr></thead><tbody>';
  [['CQ Executive','br_cq_exf'],['CQ Memory','br_cq_mem'],['CQ Processing','br_cq_ps'],
   ['CQ Overall','br_cq_overall'],['TAQ','br_taq'],['MoCA Total','br_moca_overall']].forEach(function(p){
    h+='<tr><td class="nc">'+p[0]+'</td>';
    var vals=S.br.map(function(v){return numVal(v[p[1]]);});
    vals.forEach(function(val,i){
      var dlt='';
      if(i>0&&val!==null&&vals[i-1]!==null){var d=val-vals[i-1];dlt=d>0?'<span class="du"> +'+Math.abs(d).toFixed(1)+'</span>':d<0?'<span class="dd"> -'+Math.abs(d).toFixed(1)+'</span>':'<span class="de"> =</span>';}
      h+='<td>'+(val!==null?val:'—')+dlt+'</td>';
    });
    h+='</tr>';
  });
  return h+'</tbody></table></div></div>';
}

// ─── CONFIG ───
function openCfg(){ g('cfg-url').value=getCfg().url||''; g('modal').classList.add('open'); }
function closeCfg(){ g('modal').classList.remove('open'); }
function saveCfg(){
  localStorage.setItem('ahg_cfg',JSON.stringify({url:g('cfg-url').value.trim()}));
  closeCfg(); toast('บันทึกแล้ว');
}
g('modal').addEventListener('click',function(e){if(e.target===this)closeCfg();});

// ─── TOAST ───
function toast(msg,type){
  var t=g('toast'); t.textContent=msg; t.className='toast '+(type||'')+' show';
  clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},3500);
}

// ─── AUTO OPEN CONFIG ───
window.addEventListener('DOMContentLoaded',function(){
  if(!getCfg().url) setTimeout(openCfg,600);
});
</script>
