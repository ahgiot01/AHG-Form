<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AHG - FO Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f2;--s1:#fff;--s2:#f0ece6;
  --bd:#ccc6bc;--tx:#2c2820;--tm:#7a7268;--td:#b0a898;
  --ac:#5c7a5c;--hi:#c0392b;
  --fn:"Sarabun",sans-serif;--mo:"IBM Plex Mono",monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);min-height:100vh;}

/* ── SCREEN UI ── */
.screen-bar{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.screen-bar img{height:32px;width:auto;}
.screen-bar .tb-t{flex:1;font-size:13px;font-weight:600;color:var(--tm);}
.screen-bar button{padding:8px 14px;border:none;border-radius:6px;font:600 12px var(--fn);cursor:pointer;}
.btn-print{background:#2c2820;color:#fff;}
.btn-cfg{background:none;border:1px solid var(--bd) !important;color:var(--tm);font-size:11px !important;text-decoration:underline;}

.search-row{padding:10px 16px;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;gap:8px;}
.search-row input{flex:1;background:var(--s2);border:1.5px solid var(--bd);border-radius:6px;padding:8px 11px;font:14px var(--fn);color:var(--tx);outline:none;}
.search-row input:focus{border-color:var(--ac);}
.search-row input::placeholder{color:var(--td);}
.search-row button{padding:8px 18px;background:var(--tx);color:var(--bg);border:none;border-radius:6px;font:600 13px var(--fn);cursor:pointer;}
.search-row button:disabled{opacity:.5;}

.msg{text-align:center;padding:48px 16px;color:var(--td);}
.msg .ic{font-size:38px;margin-bottom:10px;}
.msg h2{font-size:15px;font-weight:600;color:var(--tm);margin-bottom:5px;}
.spin{display:inline-block;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--tx);color:var(--bg);border-radius:8px;padding:9px 16px;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;max-width:92vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.err{background:#c0392b;}

.mov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s;}
.mov.open{opacity:1;pointer-events:all;}
.mbox{background:var(--s1);border-radius:10px 10px 0 0;padding:20px 16px 28px;width:100%;}
.mbox h3{font-size:15px;margin-bottom:4px;}
.mbox p{color:var(--tm);font-size:12px;margin-bottom:12px;}
.mfi{width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:6px;padding:9px 11px;font:14px var(--fn);color:var(--tx);outline:none;margin-top:4px;margin-bottom:10px;display:block;}
.mfi:focus{border-color:var(--ac);}
.ma{display:flex;gap:8px;margin-top:12px;}
.bms{flex:1;padding:10px;border-radius:6px;border:1.5px solid var(--bd);background:var(--s2);color:var(--tx);font:600 13px var(--fn);cursor:pointer;}
.bmp{flex:1;padding:10px;border-radius:6px;border:none;background:var(--tx);color:var(--bg);font:700 13px var(--fn);cursor:pointer;}

/* ── REPORT (print area) ── */
#report-wrap{padding:16px;max-width:960px;margin:0 auto;}

.rpt{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:20px;font-size:12px;}

/* REPORT HEADER */
.rpt-header{display:flex;align-items:flex-start;gap:16px;border-bottom:2px solid var(--tx);padding-bottom:10px;margin-bottom:12px;}
.rpt-logo{height:48px;width:auto;}
.rpt-title-block{flex:1;}
.rpt-title{font-size:18px;font-weight:700;letter-spacing:.08em;color:var(--tx);}
.rpt-subtitle{font-size:11px;color:var(--tm);margin-top:2px;}
.rpt-meta-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;border:1px solid var(--bd);border-radius:4px;overflow:hidden;font-size:11px;}
.rpt-meta-head{background:#2c2820;color:#fff;padding:4px 8px;font-weight:700;text-align:center;font-size:10px;letter-spacing:.04em;}
.rpt-meta-val{padding:4px 8px;text-align:center;border-top:1px solid var(--bd);font-family:var(--mo);font-size:11px;}

/* VISIT HEADER ROW */
.visit-cols{grid-template-columns:180px repeat(4,1fr) 120px;}
.col-head{background:#f0ece6;font-weight:700;text-align:center;padding:5px 4px;border:1px solid var(--bd);font-size:10px;letter-spacing:.03em;}
.col-date{font-size:10px;color:var(--tm);font-weight:400;}
.col-visit-num{font-size:11px;font-weight:700;}

/* TABLE */
.rpt-table{width:100%;border-collapse:collapse;margin-bottom:0;}
.rpt-table th,.rpt-table td{border:1px solid var(--bd);padding:4px 6px;font-size:11px;vertical-align:middle;}
.rpt-table th{background:#f0ece6;font-weight:700;text-align:center;}

/* Section header row */
.sec-row td{background:#2c2820 !important;color:#fff;font-weight:700;font-size:11px;letter-spacing:.05em;padding:5px 8px;}
.sec-row .sec-ico{font-size:14px;margin-right:6px;}

/* Sub-section header */
.sub-row td{background:#e8e2da;font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--tm);padding:4px 8px;}

/* Test name cell */
.test-name{padding-left:12px;color:var(--tx);font-size:11px;}
.test-val{text-align:center;font-family:var(--mo);font-size:11px;}
.test-val.nil{color:var(--td);}
.test-norm{text-align:center;color:var(--tm);font-size:10px;background:#fafaf8;}

/* Vital signs mini table */
.vital-mini{width:100%;border-collapse:collapse;font-size:10px;}
.vital-mini th{background:#e8e2da;padding:3px 5px;border:1px solid var(--bd);text-align:center;font-weight:700;font-size:9px;letter-spacing:.03em;}
.vital-mini td{border:1px solid var(--bd);padding:3px 6px;text-align:center;font-family:var(--mo);}
.vital-mini .vl{text-align:left;font-family:var(--fn);font-weight:600;color:var(--tm);}

/* Note row */
.note-row{border-top:1px solid var(--bd);padding-top:8px;margin-top:8px;font-size:11px;color:var(--tm);}
.note-label{font-weight:700;color:var(--tx);}

/* ── PRINT ── */
@media print{
  .screen-bar,.search-row,#area-empty,#area-loading,#area-nf,.btn-print,.btn-cfg,.mov,.toast{display:none !important;}
  body{background:#fff;}
  #report-wrap{padding:0;max-width:100%;}
  .rpt{border:none;border-radius:0;padding:12px;}
  @page{size:A4;margin:10mm;}
}
</style>
</head>

function getNorm(k,age,gender){
  var a=parseFloat(age)||0, male=(gender==='ชาย');
  var e=NR_AGE[k];
  if(e){for(var i=0;i<e.ranges.length;i++){var r=e.ranges[i];if(r[0]===-1||(a>=r[0]&&a<=r[1]))return male?r[2]:r[3];}return '-';}
  var s=NR_STATIC[k];return s?s.def:'-';
}

var ST={patient:null,visits:[]};

function showArea(s){
  byId('area-empty').style.display=s==='empty'?'':'none';
  byId('area-loading').style.display=s==='loading'?'':'none';
  byId('area-nf').style.display=s==='nf'?'':'none';
  byId('report-wrap').style.display=s==='result'?'':'none';
}

// ── SEARCH ──
function doSearch(){
  var cn=byId('inp-cn').value.trim();
  if(!cn){showToast('กรุณากรอก CN','err');return;}
  var cfg=getCfg();
  if(!cfg.url){showToast('กรุณาตั้งค่า Script URL','err');openCfg();return;}
  showArea('loading'); byId('btn-srch').disabled=true;
  var url=cfg.url;
  var x1=new XMLHttpRequest();
  x1.open('GET',url+'?action=lookup&cn='+encodeURIComponent(cn));
  x1.onload=function(){
    var d1;try{d1=JSON.parse(x1.responseText);}catch(e){showToast('ข้อมูลผิดพลาด','err');showArea('empty');byId('btn-srch').disabled=false;return;}
    if(d1.status!=='found'){showArea('nf');byId('nf-msg').textContent='ไม่พบ CN: '+cn;byId('btn-srch').disabled=false;return;}
    ST.patient=d1;
    var x2=new XMLHttpRequest();
    x2.open('GET',url+'?action=getAllRows&cn='+encodeURIComponent(cn)+'&sheet=Data2');
    x2.onload=function(){
      var d2;try{d2=JSON.parse(x2.responseText);}catch(e){d2={rows:[]};}
      var all=(d2.rows||[]).sort(function(a,b){return a.date>b.date?1:-1;});
      // Take last 4 visits
      ST.visits=all.slice(-4);
      byId('btn-srch').disabled=false;
      renderReport();
      showArea('result');
    };
    x2.onerror=function(){showToast('เชื่อมต่อไม่ได้','err');showArea('empty');byId('btn-srch').disabled=false;};
    x2.send();
  };
  x1.onerror=function(){showToast('เชื่อมต่อไม่ได้','err');showArea('empty');byId('btn-srch').disabled=false;};
  x1.send();
}

  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;border:1px solid var(--bd);border-radius:4px;overflow:hidden;margin-bottom:12px;font-size:11px;">';

  metaHeads.forEach(function(m){h+='<div class="rpt-meta-head">'+m+'</div>';});
  var dates=vs.map(function(v){return fmtDate(v.date);});
  var dateStr=dates.length?dates[0]+(dates.length>1?' - '+dates[dates.length-1]:''):'-';
  [esc(p.name||'-'),esc(p.cn),esc(age),esc(gender),esc(dateStr)].forEach(function(v){
    h+='<div class="rpt-meta-val">'+v+'</div>';
  });
  h+='</div>';

  h+='<table class="rpt-table" style="width:100%;border-collapse:collapse;">';

  h+='<th style="width:140px;text-align:left;padding:5px 8px;">Test</th>';
  for(var vi=0;vi<4;vi++){

      var v=vs[vi];
      h+='<th style="text-align:center;padding:5px 4px;min-width:70px;">';
      h+='<div class="col-visit-num">ครั้งที่ '+esc(v.visit||(vi+1))+'</div>';

  h+='</tr></thead><tbody>';

    h+='<tr class="sec-row"><td colspan="7"><span class="sec-ico">'+sec.icon+'</span>'+sec.label+'</td></tr>';

}

function renderRow(k,vs,nv,age,gender){
  var lbl=getLabel(k); if(!lbl) return '';
  var unit=getUnit(k);
  var norm=getNorm(k,age,gender);
  var h='<tr>';
  h+='<td class="test-name">'+esc(lbl)+(unit?'<br><span style="font-size:9px;color:var(--td)">('+esc(unit)+')</span>':'')+'</td>';
  h+='<td style="padding:3px 6px;font-size:10px;color:var(--td);">'+esc(unit)+'</td>';
  for(var vi=0;vi<4;vi++){
    if(vi<nv){
      var val=vs[vi][k];
      var has=(val!==''&&val!==null&&val!==undefined);
      h+='<td class="test-val'+(has?'':' nil')+'">';
      h+=(has?esc(val):'-')+'</td>';
    } else {
      h+='<td class="test-val nil">-</td>';
    }
  }
  h+='<td class="test-norm">'+esc(norm)+'</td>';
  return h+'</tr>';
}

// ── CONFIG ──
function openCfg(){byId('cfg-url').value=getCfg().url||'';byId('rpt-modal').classList.add('open');}
function closeCfg(){byId('rpt-modal').classList.remove('open');}

// ── TOAST ──
function showToast(msg,type){
  var t=byId('rpt-toast');
  t.textContent=msg; t.className='toast '+(type==='err'?'err':'')+' show';
  clearTimeout(t._tid); t._tid=setTimeout(function(){t.classList.remove('show');},3500);
}

// ── EVENTS ──
document.addEventListener('DOMContentLoaded',function(){
  byId('btn-srch').addEventListener('click',doSearch);
  byId('inp-cn').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch();});
  byId('btn-print').addEventListener('click',function(){window.print();});
  byId('btn-cfg').addEventListener('click',openCfg);
  byId('btn-cfg-cancel').addEventListener('click',closeCfg);
  byId('btn-cfg-save').addEventListener('click',function(){
    localStorage.setItem('ahg_rpt',JSON.stringify({url:byId('cfg-url').value.trim()}));
    closeCfg(); showToast('บันทึกแล้ว');
  });
  byId('rpt-modal').addEventListener('click',function(e){if(e.target===this)closeCfg();});
  if(!getCfg().url) setTimeout(openCfg,600);
});

})();
</script>
